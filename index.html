## 一、项目概述

> 本章概述游戏的核心定位、类型、平台、玩法支柱和卖点，为后续所有系统设计提供顶层框架。

> 一款可在 Steam 发布的轴测风格怪兽养殖模拟游戏，包含 **7 种怪兽**、**4 个成长阶段**各自的完整玩法、**1 个可扩展的养殖场地图**，核心循环可体验 **约 60 分钟**（1 个完整年周期），含主菜单、存档与新手引导。

### 一句话描述

**在一座科幻风格的巨兽研究所中，养育七种建筑级怪兽、设计共生生态网络、指挥灵体员工大军，让你的养殖场成为一台活的、会呼吸的生态机器。**

### 核心体验

玩家经营一座怪兽养殖场，通过孵化、喂养、培育怪兽来扩大农场规模。每只怪兽从蛋到成体需要经历不同阶段，每个阶段对应一种独特的交互玩法。

七种体���从猫到楼房的怪兽共存于同一片领地，它们之间的热能、水流、气流、声波、电弧形成一张复杂的共生网络——玩家的核心策略不是"养好每一只"，而是**设计整个生态系统的运转方式**。

同时，数百个半透明发光的灵体员工在巨兽脚下忙碌，管道在地面与空中交错延伸，四季轮转驱动着一切的节奏。

### 主要系统一览

| 系统 | 简介 | 核心体验 |
|------|------|----------|
| **怪兽养殖** | 7 种怪兽 × 4 成长阶段（蛋→幼体→少年→成体），每阶段有独特玩法 | 养育+观察+策略取舍 |
| **共生网络** | 怪兽间通过水流/气流/气场/副产物/行为形成五层共生传导 | 生态设计+正反馈循环 |
| **灵体员工** | 半透明发光小人，6 等级体系，从实习生到主管的职业成长 | 间接管理+安全路线设计 |
| **管道系统** | 7 种颜色管道（饲料/幼崽/医疗/资源/灵体/热能/电力）构成血管网络 | 路径规划+物流优化 |
| **四季循环** | 每季 15 分钟，春繁殖→夏产出→秋收获→冬休��，驱动全局节奏 | 季节策略+提前规划 |
| **造景系统** | 6 大类 24 种造景物，影响怪兽心情/产出，驱动养殖场评分 | 美观+功能性双重经营 |
| **配套建筑** | 6 大功能园区（运维/技术/工程/科研/指挥/生活），30+ 种建筑 | 基建扩张+布局策略 |

### 游戏氛围与卖点

| 卖点 | 描述 |
|------|------|
| **巨构感** | 楼房级巨兽脚下，数百个蚂蚁般的灵体员工忙碌——"蚁穴"与"巨构"的视觉冲击 |
| **活的生态箱** | 怪兽不是静态摆件，它们散热、呼吸、歌唱、飞行——整个农场像一台运转的有机机器 |
| **认知陷阱** | 每种怪兽"看起来该怎么养，实际不是那样"——发现真相的惊喜贯穿全程 |
| **季节戏剧性** | 冬天全场靠一只熔岩巨蜥续命、春天黑羊先知隐身越狱、夏天全力产出——节奏感强烈 |
| **共生涌现** | 玩家发现"原来熔岩巨蜥的热水流下去刚好给苔原巨木兽加温"时的顿悟时刻 |
| **解压观赏** | 怪兽泡温泉顶蛋、幼体围观萤火虫、渊鲸歌唱安抚全场——高密度的可爱/趣味细节 |

## 一B、世界观设定

> 本章描述游戏所处世界的底层物理法则、形成机制、术语体系、玩家身份、地图结构、资源系统、NPC 设计、叙事碎片系统和灵体员工的全新设定。世界观是所有系统设计的叙事骨架。

### 1B.1 术语体系

| 科学概念 | 虚空术语 | 英文 | 含义 |
|---------|---------|------|------|
| 白洞（物质喷出端） | 涌口 | The Wellmouth | 万物涌出之口，天穹中有多个 |
| 黑洞（物质吞噬端） | 吞渊 | The Maw | 散布在宇宙各处的引力陷阱 |
| 虫洞 | 咽道 | The Gullet | 连接吞渊与涌口的通道 |
| 物质喷出现象 | 涌落 | Downpour | 天上掉东西是日常天气 |
| 具体掉落物 | 落物 | Fallmatter | 从涌口掉下来的任何东西 |
| 时间非线性特性 | 时褶 | Timefold | 时间被折叠重叠 |
| 流放刑罚 | 渊刑 | Maw Sentence | 将犯人投入吞渊 |
| 逆向虫洞（黑市技术） | 逆咽 | Reverse Gullet | 不完美的反向通道 |

**四季命名：**

| 游戏季节 | 虚空术语 | 对应现实 | 涌口状态 |
|---------|---------|---------|---------|
| 涌潮期 | Spring Surge | 春 | 涌口活跃度上升，落物增多 |
| 炙光期 | Blazing Phase | 夏 | 涌口辐射压最强，光照与热量峰值 |
| 坠落期 | Falling Tide | 秋 | 涌口周期性喷射大型落物 |
| 寂潮期 | Silent Tide | 冬 | 涌口活跃度最低，辐射压减弱 |

### 1B.2 虚空之地的形成

**核心设定：** 虚空之地是宇宙中一块由多个白洞（涌口）持续喷射物质、经数十亿年堆积而成的不规则碟状大陆。

**形成机制：**

- 天穹中有**多个涌口**分布在不同方位，每个涌口连接着宇宙各处不同的吞渊
- 各涌口持续喷射从吞渊吞噬的物质——岩石、水、气体、有机物、文明碎片、时间碎片
- 物质堆积数十亿年，在涌口群辐射压与真空负压的平衡点处形成碟状大陆
- 玩家所在的中心区域 = **多个涌口喷射物的交汇边界区**，相对安全
- 涌口正下方反而最危险（物质密度高、时褶浓度强、落物频率极高）
- 玩家处于"夹缝"中——几个涌口辐射锥的边缘交界，落物少而分散

**物理法则：**

| 属性 | 数值/描述 |
|------|----------|
| 可居住区域 | 直径约 200 公里 |
| 重力 | 约 0.85g（涌口群辐射压与真空负压的平衡） |
| 大气层 | 涌落气体长年积累形成，成分复杂但可呼吸 |
| 时间特性 | 非线性（时褶现象）——同一地点可能叠加多个时间流 |
| 涌落频率 | 边缘区高频；中心交汇区低频（玩家所在地） |
| 天穹景观 | 抬头可见多个发光涌口，像不规则分布的小太阳 |

**虚空之地的景象：**

抬头看天——虚空之地的"天空"没有蓝色，只有一片深紫近黑的永恒暮色。在这片暮色中，分布着五到七个不规则的光裂缝——那就是涌口。最大的一个长约四十公里，宽度在数百米到数公里之间周期性脉动。它的颜色不断变化——当来自年轻恒星的物质涌出时，呈现白炽的蓝；当古老行星的碎片通过时，变为暗沉的琥珀；当某个文明的废墟被喷出的瞬间，偶尔会闪烁出电子屏幕的冷绿色。

较小的涌口散布在天穹的不同方位，有的只有数百米长，喷出稀薄的气体和微尘；有的闪烁不定，像是随时会关闭又永远不会关闭的伤口。

在这些涌口的正下方，可以看到持续的"物质雨"——从微尘到巨石的落物不断坠下，如同一条条发光的瀑布从天穹垂向大地。玩家所在的位置恰好在几条"瀑布"之间的空隙——这里落物稀少，相对安全。

向四周看——地面是多种物质长年堆积形成的"拼贴画"。你的脚下可能是一块来自46亿年前地球地幔的黑色岩石，紧挨着一片来自某个冰行星的永冻土，旁边又是一段不知来自哪个文明的金属管道残件。再远处，常规的泥土和草地覆盖着最古老的堆积层——那些已经风化了数十亿年的物质，终于变成了"正常"的大地。

### 1B.3 玩家身份

玩家是地球某生物科技公司的普通员工。发现公司非法实验数据后偷了一份试图举报，被以"知识产权窃贼"罪名渊刑流放至虚空之地。

- 身无长物（穿越咽道时物品散失）
- 保留生物科技知识（养殖怪兽的理论基础）
- 落在古老稳定平台上（养殖场所在地）
- 被第一滴（灵体长老）发现并收留

### 1B.4 地图与地形

**设计原则：**
- 大部分地图是**常规平原/草地/泥土地**作为基底
- 特殊地形只是点缀，且**不能相邻**（中间必须有正常土地过渡）
- 水域丰富：河流、湖泊、池塘交错分布
- 支持**垂直建造**：悬崖、高台、地下层
- **野外不存在野生怪兽**——探索可获得胚胎碎片

**8种特殊地形：** 熔渣荒原 / 深渊水域 / 异星密林 / 金属废墟 / 晶体矿脉 / 风蚀高台 / 骨骸沼泽 / 碎裂漂浮带

**特殊地形详细描写：**

> **① 熔渣荒原**
> 黑色龟裂的大地延伸向远方，裂缝中透出暗红的光芒——那是来自某颗恒星系行星地幔碎片残余的热量，数百万年后仍未完全冷却。空气中弥漫硫磺气味和热浪扭曲的光影。散布着半融化的金属构件——某些来自工业文明的废弃设施在高温中变形为诡异的雕塑，像是被捏碎又重塑的糖果。远处偶尔喷出一道热气柱，发出嘶嘶的警告声。

> **② 深渊水域**
> 墨蓝色的水面几乎不起波澜，但水下却透出幽微的冷光——仿佛深处有什么东西在呼吸。湖岸由灰白色的珊瑚状物质构成，摸上去冰冷且微微震颤。空气清冽带咸，偶尔从水面泛起一个巨大的气泡，破裂时发出低沉的"咚"声，像是深处有什么在叹息。据说在极其安静的夜晚，可以听到从水底传来的渊鲸的歌声——那些从未被记录过的、属于另一个世界的旋律。

> **③ 异星密林**
> 这里的"树木"不是任何人认识的形状——有的像倒置的水母，透明的伞盖下垂着发光的丝缕；有的是螺旋上升的柱状结构，表面覆盖着会收缩的感光鳞片；还有的只是一团团悬浮在半空的球状根系，内部包裹着不知名的液体。空气温暖潮湿，弥漫着一种难以形容的气味——像花蜜、铁锈和臭氧的混合物。四面八方传来微弱的咔嗒声和嗡鸣声，那是这些异星植物在"交流"。方向感在这里完全失效——据说连指南针的指针也会绕着自己打转。

> **④ 金属废墟**
> 高耸的金属残骸如同钢铁森林般矗立，有些仍保留着可辨认的结构——半截飞船引擎、一面巨型仪表盘、一段扭曲的走廊。锈蚀与光泽并存，某些合金在涌口辐射下反而变得更加坚固和明亮。空气中有金属摩擦的涩味和偶尔的电弧臭氧味。风穿过这些残骸间的缝隙时，发出如同管风琴般的呜咽。偶尔，某个深处的残骸中亮起一盏灯——那是某个文明的备用电源还在忠实地工作，为已经不存在的主人照亮回家的路。

> **⑤ 晶体矿脉**
> 大大小小的晶体从地面生长出来，如同一座棱镜花园。最小的如拇指大小，最大的有三层楼高。涌口的光线穿过它们后被折射成无数道彩虹，整个区域在视觉上像是一场永不结束的极光展览。晶体相互碰撞时发出清脆的共鸣，不同的晶体发出不同的音高，形成一种天然的交响乐。地面有时传来细微的振动——那是深层的晶体还在缓慢生长，如果不加控制地开采，它们积累的应力可能引发共振坍塌，所有晶体在瞬间粉碎为齑粉。

> **⑥ 风蚀高台**
> 风从四面八方涌来，永不停歇。这些高台是被亿万年大风打磨出的杰作——光滑的曲面、蘑菇状的悬岩、针尖般的石柱。站在台顶可以俯瞰虚空之地的大片区域，天穹上的涌口在这个高度显得更大、更近、更令人敬畏。风声是这里唯一的背景音——低吟、咆哮、或偶尔变成尖利的口哨。衣服和头发被吹得水平飘起。散落在高台上的"高空落物"往往来自涌口的最新喷射——因为重量轻，被风吹到了远离垂直落点的地方。

> **⑦ 骨骸沼泽**
> 温热潮湿的雾气笼罩一切。脚下是深浅不一的泥浆，混合着数十亿年沉积的有机残骸——骨骼、甲壳、木化石、不明软体生物的干缩残留。走一步发出吧唧的声音，空气中是腐殖质的浓厚气息，不算难闻，更接近于雨后森林的泥土味道。沼泽中偶尔冒出磷火般的蓝绿色幽光，那是有机物分解时释放的化学反应。这里是胚胎碎片的宝库——那些穿越咽道时被撕碎的生物组织，在温热的泥浆中保存得出奇完好。但沼泽也有危险——某些区域的泥层看似浅薄，踩下去却是深不见底的陷阱。

> **⑧ 碎裂漂浮带**
> 大陆的边缘不是悬崖，而是……碎裂。大大小小的岩块漂浮在虚空中，最大的有足球场大小，最小的如同鹅卵石，它们缓慢地旋转、漂移、偶尔相撞。站在大陆边缘向外望去，视线穿过这些漂浮的岛屿，最终消失在深紫色的虚空中——那是真正的"无"，没有大气，没有物质，只有涌口辐射压勉强维持着的引力场。这里的重力不稳定——跳起来可能飘浮三秒，也可能突然被拽向某块岩石。从漂浮岩块的裂缝中偶尔闪过时褶碎片的幽蓝色光芒，那是时间本身在空间断裂处渗出的痕迹。

**垂直层级：** 地下层→地表层→高台层→悬浮层

**功能：** 灵体系统核心NPC / 灵体社群顾问 / 世界观关键（记忆揭示早期历史）

**台词精选：**
- **造体：** "身体不是牢笼——对我们灵体来说，它是一艘船。你为它们建造的每一具躯壳，都是在说'我希望你留下来'。"
- **好感度高：** "你在对待灵体时，不是在'使用工具'。你在照顾生命。"

</details>

<details>
<summary>👤 眨眼（Blink）— 时间偷猎者</summary>

**身份：** 似乎不完全存在于当前时间中——同时存在于多个时间点，说话时经常"跳帧"。自称可以在时褶中"偷"一点时间来用。

**外观：** 穿着混合多个时代风格的衣物——半边是未来感金属质地，反射着冷蓝色的光泽；半边是中世纪风格的棕色皮革。眨眼频率极高，每次眨眼时瞳孔颜色都不一样——绿、金、红、紫、银，像是有人在快速切换滤镜。身形时有时无，如同信号不好的全息投影。

**功能：** 限时交易（60-90秒） / 时间悖论事件 / 信息预售（70%准确率）

**台词精选：**
- **出现：** "嘿——（消失2秒）——你好——抱歉，锚点不稳。快说——想要什么？我大概还能在'现在'待70秒。"
- **好感度高：** "你是我少数几个'每次都在'的人。我每次回到'现在'——你还在。这对我来说……很重要。"

</details>

**身份：** 来自一个植物型智慧种族——通过根系网络共享意识。根须是被涌落带到虚空之地的"分支意识"，与母星失联后被迫成为独立个体。

**外观：** 身高约1.5米的类人植物，身体是深绿色的木质茎干，表面有精细的树皮纹理。头部开着一朵随心情变色的大花——平静时白色、高兴时金色、悲伤时蓝紫色。手指末端是柔软的根须，握手时能感觉到它们在微微蠕动。四季外观变化明显：春天嫩绿新叶、夏天花朵盛开、秋天变红变黄、冬天光秃结出半透明冰晶果实。

**功能：** 怪兽健康顾问 / 药剂/饲料配方提供者 / 苔原巨木兽深度理解者

#### 6.1B.7 叙事碎片系统：交货报告

> **设计理念：** 交货报告是游戏中最重要的叙事暗线之一。每份报告以经手人"老缝"的个人口吻写成，以吐槽式的幽默和不经意的人情味，揭示玩家养殖场卖出的怪兽最终去了哪里、产生了怎样的文明影响。这些报告暗示了一个惊人的真相——**地球上所有神话传说中的神兽，都来自养殖场的"交付"。** 报告通过"时褶回溯"将游戏内的科幻设定与现实神话连接，创造出独特的"恍然大悟"体验。

| 叙事基调 | 老缝经手人口吻 × 吐槽式人情味 × 神话暗线 |

### 7.1 熔岩巨蜥（火/热源型）

**外观概念：** 厚重的蜥蜴/龙形体态，鳞甲下隐约可见岩浆流动的光纹。随成长阶段，体表裂纹越来越多，裂纹中透出橙红热光。

#### 7.1.1 基础信息

| 项目 | 内容 |
|------|------|
| **属性** | 火/热源 |
| **成体体型** | 楼房级（约15m高） |
| **生态位** | 中层·火山岩区 |
| **繁殖方式** | 卵生（高温蛋，60-80°C孵化，1-2枚/次，孵化时间2min） |
| **社会性** | 独居·领地意识极强（同区域仅容1只成体） |
| **亲代照顾** | C级（不在乎）——可能无意间用体温孵蛋，也可能踩碎 |
| **核心价值** | 全场热源中枢——冬季全场靠它续命 |
| **认知陷阱** | 不是给它加热，是给它降温 |

#### 7.1.2 外观设定

| 阶段 | 尺寸 | 颜色与材质 | 视觉特征 | 参考动物 |
|------|------|-----------|----------|----------|
| 蛋 | 排球大小（直径~20cm） | 黑色岩壳，哑光质感 | 表面红色纹路有节奏脉动，像心跳；靠近可感受热辐射 | 火山岩 |
| 幼体 | 猫大小（体长~40cm） | 光滑黑鳞，半反光 | 眼睛橙色无瞳孔，尾巴短而粗，爪垫散发微热 | 科莫多巨蜥幼体 × 火蝾螈 |
| 少年 | 牛大小（肩高~1.5m） | 深灰鳞甲，裂纹开始出现 | 裂纹从脊背蔓延，裂纹中透出橙光；运动后体表冒蒸汽 | 科莫多巨蜥 × 犀牛 |
| 成体 | 楼房级（肩高~15m） | 暗黑岩甲，遍布发光裂纹 | 行走时脚下留熔岩痕迹，呼吸可见热浪扭曲空气；脊背隆起如山脊，裂纹网络如岩浆河流图 | 恐龙（暴龙体态）× 活火山 |

**特殊视觉效果：**
- 高温期（6min循环）：裂纹亮度×3，体表空气可见扭曲，周围雪/水汽化
- 冷却期：裂纹暗淡为暗红，偶尔闪烁，表面凝固为灰黑色壳
- 极乐状态：体表绽开"火焰花"——短暂的等离子体花纹，极为美丽

#### 7.1.3 性格与智力

| 维度 | 描述 |
|------|------|
| **基础性格** | 沉默、自傲、领地意识极强，对非威胁存在表现出冷漠的容忍 |
| **智力等级** | ★★★☆☆（3/5）——能理解简单的因果关系，记住固定路线和灵体面孔，但不会主动配合 |
| **对人态度** | 无视为主；长期高心情饲养后可达到"容忍靠近"级别，但永远不会亲近 |
| **驯化难度** | 极高——不是因为凶猛，而是因为它根本不在乎你。它活在自己的热力学世界里 |

#### 7.1.4 性格培养系统

**初始性格池：**

| 性格 | 概率 | 描述 |
|------|------|------|
| 沉默之岩 | 40% | 安静稳定，高温周期规律，几乎不主动互动 |
| 暴躁火山 | 25% | 体温波动大，易怒，但产出峰值更高 |
| 懒热源 | 20% | 散热效率低但性情温和，喜欢泡温泉不想动 |
| 好奇火种 | 10% | 罕见！会主动靠近新设施观察，对灵体偶尔表现出兴趣 |
| 孤傲龙裔 | 5% | 极端领地意识，但驯化后产出品质最高 |

**四维度培养轴：**

| 维度 | 低值表现 | 高值表现 | 培养方式 |
|------|----------|----------|----------|
| 气质（暴躁↔沉稳） | 高温期延长+不可预测 | 高温周期精确规律 | 稳定喂食节奏+冷热交替训练 |
| 社交（孤僻↔容忍） | 灵体靠近3格即喷蒸汽 | 允许灵体在冷却期触摸 | 固定灵体长期负责+喂食奖励 |
| 好奇（漠然↔探索） | 只待在固定热区 | 会沿巡游路径探索新区域 | 在路径上放置矿物诱饵 |
| 信任（戒备↔信赖） | 拒绝导热管道接入 | 主动配合放热到管道系统 | 需6+个完整季度的稳定饲养 |

**极端性格效果：**
- 气质MAX（沉稳之王）：热循环周期可被玩家调控±2min，极其适合自动化
- 社交MAX（温岩长老）：允许其他小型怪兽在冷却期靠近取暖，解锁特殊共生

#### 7.1.5 声音/通讯方式

| 状态 | 声音描述 | 功能 |
|------|----------|------|
| 平静 | 低沉的隆隆声，像远处的雷——实际是体内岩浆流动 | 无特定功能，灵体可凭声频判断体温 |
| 高温期即将开始 | 低频次声波震动，可感知不可听见（玻璃杯微颤） | 警告信号——灵体有30秒撤离窗口 |
| 冷却期进入 | 长长的"嘶——"声，伴随大量蒸汽 | 表示安全期开始 |
| 愤怒/不满 | 短促爆裂音，像岩石碎裂 | 立即远离信号 |
| 极乐 | 极低频率的持续共鸣，像大地的心跳 | 范围内所有蛋孵化速度+15% |

#### 7.1.8 认知陷阱详解

\`\`\`

新手思维："它是火属性，应该一直加热让它舒服"
正确理解：
- 幼体期确实需要加热，但有上限（体温>85°C = 暴走阈值）
- 少年期开始自主产热，反而需要冷却设施
- 成体期的核心不是"养"而是"利用"——设计导热管道把余热分配给全场

关键时刻：
- 少年→成体过渡期：如果没提前铺好导热管道，成体第一次高温期会烧毁周围一切
- 冬季：它是全场唯一热源，必须优先保障它的运转

**常见疾病：**

**死亡条件：**
- 体温降至0°C以下持续超过1个完整季度→永久石化（可作为雕塑造景物）

- 不会自然老死——理论上寿命无限，但需要持续的热源维护

#### 7.2.8 认知陷阱详解

\`\`\`

新手思维："有水就行了，挖个池子养着"
正确理解：
- 幼体：小水体可以，但必须有持续氧气供给（瀑布落差/气泵/水车）
- 少年：不只要水深，还需要水流（静水=窒闷）——用瀑布/管道循环制造洋流
- 成体：不是"养在水里"——是"围绕它设计整个水系统"
  - 它的身体就是珊瑚礁 → 其他水生资源在它身上生长
  - 它产生的水循环自给自足 → 但需要足够面积

关键时刻：
- 幼体→少年过渡：身体突然变大，原来的鱼缸不够→必须提前扩建水池
- 声波探矿：少年期开始发出声波→能探测地下隐藏矿脉/水源（信息价值）

**隐身规则：**

| 属性 | 详情 |
|------|------|
| 隐身持续时间 | 幼体：1-2秒（试探）；少年：10-30秒；成体：1-3分钟 |
| 触发条件 | 心情<50 / 预言涌来时 / 好奇探索 / 围栏有漏洞 |
| 隐身期间可做 | 攀爬（无视围栏）/ 靠近灵体低语 / 诱骗开门 / 巡视全场 |
| 反隐措施 | 热感摄像头（T4设施）/ 声纹探测器 / 地面压力传感 / 渊鲸声波探测 |
| 善意隐身 | 高心情时→隐身只为传达预言→自动回笼（无害） |
| 恶意隐身 | 低心情时→隐身为逃跑/恶作剧→灵体恐慌+可能越狱 |

**预言系统（只预言坏事）：**

**核心规则：它只预言灾祸。** 不预言好事——这是它的"恶魔本质"。但灾祸预警本身对管理者极其有价值。

| 预言等级 | 提前时间 | 事件类型 | 传达方式 |
|----------|----------|----------|----------|
| 呢喃 | 30秒前 | 小事故（管道堵塞/灵体跌倒） | 隐身后在附近灵体耳边低语→灵体汇报 |
| 低吼 | 1分钟前 | 中事故（怪兽暴走/设施故障） | 站在高处发出可闻低吼→直接警报 |
| 嚎叫 | 2分钟前 | 大灾难（季节突变/矿脉枯竭） | 角发强紫光+全场可闻嚎叫→紧急警报 |
| 默示 | 3分钟前 | 致命事件 | 隐身→出现在玩家"视角"中→地面画出符号 |

**预言准确度 = 心情 × 自由度：**
- 心情高+自由度高（有暗道巡游+攀爬路线）→ 预言精准，且善意传达
- 心情低+被囚禁 → 预言变成诅咒/恐吓，甚至故意预言错误信息

**逃跑系统（继承崖行者+隐身加强）：**

| 攻击方式 | 条件 | 后果 |
|----------|------|------|
| 攀爬越狱 | 围栏高<攀爬力（与崖行者相同） | 逃出指定区域 |
| 隐身诱骗 | 隐身→靠近门禁→模仿声音让灵体开门 | 大门洞开→可能带跑其他怪兽 |
| 恐吓出逃 | 对灵体释放恐惧气场→灵体恐慌跑开→门无人看守 | 灵体短期无法工作+逃跑 |
| 暗道利用 | 发现玩家未注意的管道/通风口 | 从意想不到的地方出现 |

**防逃设计要点：**
- 围栏高度≥攀爬力（物理防线）
- 热感监控（检测隐身个体）
- 门禁双重验证（灵体+密码，防诱骗）
- 定期巡视暗角/通风口
- **最佳方案：给它设计满意的「巡游暗道」——满足它的攀爬+黑暗+自由需求→不想逃**

### 7.4 虫群母体（集群/繁殖型）

**外观概念：** 本体是一个巨大的生物巢穴——半球形，表面覆盖六角形蜂巢结构，颜色为暗金到琥珀色。内部持续产出各种工虫（蜜蜂/蚂蚁/甲虫形态），工虫像血液一样在研究所中流动。

![虫群母体工厂](./assets/08.png)

#### 7.4.1 基础信息

| 项目 | 内容 |
|------|------|
| **属性** | 集群/繁殖 |
| **成体体型** | 小房间级（母体本体） |
| **生态位** | 地面层·温暖封闭空间 |
| **繁殖方式** | 卵生（无性分裂，大量虫卵，20-50枚/次，孵化时间1min） |
| **社会性** | 群居·天然群体·无上限（女王统帅） |
| **亲代照顾** | 特殊（集群繁殖）——工虫集体照顾全部虫卵，无个体亲代概念 |
| **核心价值** | 免费工虫劳动力——替代Lv.1-3灵体的重复劳动 |
| **认知陷阱** | 不是养怪兽，是养一座流动的工厂 |

#### 7.4.8 认知陷阱详解

**核心机制：工虫劳动力系统**

**工虫替代灵体完成低级工作**——但它们不可控、有自己的逻辑、且是消耗品。

| 工虫种类 | 功能 | 等效灵体等级 | 存活时间 | 产出速率 |
|----------|------|-------------|----------|----------|
| 搬运虫 | 运输小型资源（矿石/木材/食物） | Lv.1 | 5 分钟 | 3只/分钟 |
| 清扫虫 | 清理废弃物/落叶/灰尘 | Lv.1 | 3 分钟 | 5只/分钟 |
| 采集虫 | 从植物/矿点自动采集资源 | Lv.2 | 8 分钟 | 1只/分钟 |
| 修复虫 | 修补管道微小裂缝/设施磨损 | Lv.2 | 10 分钟 | 0.5只/分钟 |
| 侦查虫 | 探索未开发区域/侦测异常 | Lv.3 | 15 分钟 | 0.2只/分钟 |
| 战斗虫 | 驱赶入侵者/保护其他怪兽幼体 | 特殊 | 2 分钟 | 按需产出 |

\`\`\`

新手思维："虫子好恶心，赶紧消灭"
正确理解：
- 工虫是免费劳动力！替代大量 Lv.1-2 灵体的重复劳动
- 但它们不可精确控制——你设置"工作区域"，它们自主判断优先级
- 过度依赖→灵体升级慢（没工作经验）；但前期极大加速发展
- 冬季母体产出降低→突然失去大量劳动力→要做好切换准备
\`\`\`

#### 7.4.11 繁殖详述

| 项目 | 内容 |
|------|------|
| **发情周期** | 无发情概念——母体通过无性分裂持续产卵 |
| **产卵条件** | 饲料充足+温度25-35°C+巢穴空间未满 |
| **性别机制** | 所有工虫无性别；新母体通过特殊蜂王浆喂养从普通卵中分化（概率1%/批次，可通过温室控制提高至5%） |
| **分裂繁殖** | 母体达到一定规模后可"分巢"——分裂出一个幼体级新母体+部分工虫 |
| **特殊亲代行为** | 工虫集体照顾全部虫卵，无个体亲代概念；新产卵团由清扫虫团保温+喂食 |
| **人工干预** | 可通过调节温室温度控制虫种分化比例（高温→更多战斗虫，低温→更多采集虫） |

#### 7.4.12 灵魂共鸣特性

| 项目 | 内容 |
|------|------|
| **嵌合速度** | 快速但浅层（可在1个季度内建立连接，但无法深入） |
| **共鸣入口** | 将手掌贴在巢壳表面，感受内部的振动频率 |
| **内部体验** | 不是"一个意识"——是无数微小意识的同时涌入。像同时听到一万个人的低语。没有"自我"，只有"我们"。短暂失去个体感知，变成群体的一部分 |
| **可获取信息** | 整个研究所的资源分布地图（工虫已经探测过的）；母体对"饱食感"的理解——它不知道"幸福"，只知道"够"和"不够" |
| **风险** | 退出后短暂失去个体意识感（不确定"我是谁"），持续数小时；极端情况下可能暂时指挥不了灵体（因为不觉得自己是"一个人"） |
| **共鸣奖励** | 首次成功：解锁"蜂群之心"称号+虫群指挥信标精度永久+15% |

#### 7.4.14 天敌与恐惧

| 恐惧对象 | 反应 | 应对 |
|----------|------|------|
| 低温（<15°C） | 工虫大量死亡→母体收缩→产能归零 | 冬季需熔岩巨蜥余热供暖/独立加热系统 |

| 杀虫剂类物质 | 母体极度恐慌→封闭巢穴→长期停产 | 研究所内禁止使用任何化学杀虫物质 |

#### 7.4.15 伤病与死亡

**常见疾病：**

| 疾病 | 症状 | 原因 | 治疗 |
|------|------|------|------|
| 巢壳软化症 | 巢壳变软失去结构，工虫产出效率-40% | 湿度过高/温度波动大 | 调节环境湿度+涂抹蜂蜡硬化剂 |
| 虫种退化 | 所有工虫退化为同一种（搬运虫），失去分化能力 | 饲料单一化 | 恢复多样化饲料+温室重新分化培育 |
| 工虫叛离 | 部分工虫脱离母体控制，成为野生害虫 | 母体心情长期低落 | 提高心情+用信标重新标记+消灭叛离虫群 |
| 寄生菌感染 | 巢壳表面长出异常菌丝，侵蚀内部结构 | 清洁不足/潮湿环境 | 清洁虫加班清理+涂抹抗菌蜂蜜 |

**死亡条件：**
- 完全断食超过2个周期→母体萎缩为空壳，工虫全部死亡
- 温度降至0°C以下持续1个季度→冻死（整个巢穴变为琥珀色化石——可作收藏品）
- 心情持续0维持2个季度→母体停止一切生命活动，巢壳崩塌

**外观概念：** 巨型飞行生物，翅展巨大，身体覆盖羽状鳞片，周身笼罩薄雾。飞行时翅膀拍打产生强风和气流，像活的气象系统。颜色为灰白到风暴蓝。

#### 7.5.8 认知陷阱详解

\`\`\`

新手思维："关在笼子里养着，反正它也不小"
正确理解：
- 它必须飞！不飞=不只是不开心，是会暴走制造风暴
- 不能有天花板——需要开放天空
- 核心不是"养"它而是"设计航线"：
  - 途经风车→发电
  - 途经货站→空运
  - 途经热区→散热
  - 途经渊鲸水域→召唤风雨增压→渊鲸浮出（喂养/治疗窗口）
- 它的航线就是你的"空中基础设施"
\`\`\`

**航线功能系统：**

| 飞行航线功能 | 途经设施 | 效果 |
|-------------|----------|------|
| 风力发电线 | 风车阵列 | 飞过一次=充电 20%（雷脊兽蓄电池） |
| 空运货线 | 高台货站A→货站B | 快速远距运输（替代地面管道） |
| 散热巡航线 | 熔岩巨蜥上空 | 带走余热→降低过热风险 |
| 气压召唤线 | 渊鲸水域上空 | 召唤风雨→气压骤升→渊鲸浮出水面=喂养/治疗/体检窗口 |
| 防暑喷雾线 | 全场上空 | 夏季散播雾气→降温 2-3°C |

#### 7.5.15 伤病与死亡

**常见疾病：**

| 疾病 | 症状 | 原因 | 治疗 |
|------|------|------|------|
| 翼膜撕裂 | 翅膀出现裂口，飞行能力受损 | 暴风中飞行/碰撞/挣扎 | 灵体缝合（Lv.4操作）+静养半个季度 |
| 雾腺堵塞 | 尾部不再产出雾气 | 灰尘/矿物粉末堵塞腺体 | 清洗雾腺（需在高台上用温水清理） |
| 飞行恐惧症 | 拒绝起飞，蜷缩在高台上 | 遭受过坠落/雷击创伤 | 从短距低空飞行开始恢复训练 |
| 羽毛真菌感染 | 羽毛变灰脱落，飞行阻力增大 | 潮湿环境+通风不足 | 药浴+阳光暴晒+通风 |

**死亡条件：**
- 翅膀完全损毁无法修复→心情归零后3个季度内抑郁死亡
- 被困封闭空间超过1个完整季度→因持续撞击自伤而亡
- 心情持续0维持3个季度→翅膀自行收拢、不再展开，化为石像

### 7.6 苔原巨木兽（植物/光合型）

**外观概念：** 四足行走的巨型树状生物。躯干是粗壮的树干，四肢是巨根，头部是树冠。随成长，身上的生态越来越丰富——苔藓、蘑菇、藤蔓、鸟巢、甚至小型灵体宿舍都可以建在它身上。

#### 7.6.1 基础信息

| 项目 | 内容 |
|------|------|
| **属性** | 植物/光合 |
| **成体体型** | 3-4层楼高巨树 |
| **生态位** | 地面-中层·扎根型（移动↔扎根双形态） |
| **繁殖方式** | 种子繁殖（开花→授粉→结果→落种→育苗→移植，3-8颗种子/果实） |
| **社会性** | 弹性型·扎根后形成植被圈（根系辐射范围内吸引其他生物聚集） |
| **亲代照顾** | B级（被动照顾）——根系自然包裹种子提供养分+保温（被动照顾） |
| **核心价值** | 全场光合中枢+建筑平台+有机肥/氧气供给 |
| **认知陷阱** | 不是种一棵树，是建造一栋活的公寓楼 |

#### 7.6.3 性格与智力

| 维度 | 描述 |

| **基础性格** | 极度温和、缓慢、包容——它对几乎所有生物都表现出母性般的接纳 |
| **智力等级** | ★★☆☆☆（2/5）——反应极慢（以植物的时间尺度思考），但有深层的环境感知能力 |
| **对人态度** | 被动接纳——不会主动亲近，但也从不排斥。它把所有靠近的生物当作"共生伙伴" |

#### 7.6.8 认知陷阱详解

**扎根系统详解：**

\`\`\`

扎根状态：
- 触发：静止不动 > 5分钟（游戏时间）
- 效果：
  ✓ 范围 4 格内植被产出 ×3
  ✓ 范围 4 格内土壤肥沃度 +100%
  ✓ 背部可建造小型设施（工人宿舍/观测站/采集点）
  ✓ 根系向外扩展→每分钟扩 1 格
  ✗ 无法移动（直到玩家"唤醒"操作）
  ✗ 根系可能挤压邻近管道/设施
  
唤醒操作：
- 需要 Lv.4 工程师 ×5 人协作（大型操作）
- 唤醒后 30 秒内可指定新位置
- 扎根→唤醒→迁移→重新扎根 = "轮作"策略

最佳策略：
- 规划 2-3 个"扎根位"，轮流扎根
- 每个扎根位周围预留发展空间
- 在它背上建灵体宿舍 → 工人通勤距离为 0
\`\`\`

### 7.7 雷脊兽（电/能源型）

**外观概念：** 体态介于犀牛和穿山甲之间，背部一排排晶体脊突起，如同天然的蓄电池阵列。晶体随电量变化：空时灰白、满时电弧蓝紫。尾部有放电器官。

#### 7.7.1 基础信息

| 项目 | 内容 |
|------|------|
| **属性** | 电/能源 |
| **成体体型** | 卡车大小 |
| **生态位** | 地面层·开阔平地（需充放电空间） |
| **繁殖方式** | 卵生（带电蛋壳，1-2枚/次，30-45°C孵化，需周期性电击，孵化时间2min） |
| **社会性** | 独居·极端领地性（同区域仅容1只成体；2只相遇→放电对抗） |
| **亲代照顾** | D级（可能伤害后代）——放电时不避开蛋/幼体，电击伤亡率60% |
| **核心价值** | 全场电力供给+蓄电池+过载放电应急能量 |
| **认知陷阱** | 最危险的怪兽——但离开它全场断电 |

#### 7.7.8 认知陷阱详解

\`\`\`

新手思维："电系的，让它发电就好了"
正确理解：
- 它不是"发电机"——它是"活的电容器"
- 充电：吃矿物质饲料/日光浴/运动摩擦→电量上升
- 放电：必须有通道释放→接入蓄电池/电网/放电塔
- 不放电=灾难：电量到100%→不可控释放→区域电磁脉冲
  → 电子设备全停/灵体麻痹/管道系统短路

核心节奏：充电→储存→定时放电→再充电
- 玩家的任务是设计"放电时间表"——让它在需要的时候放电
- 最佳：它的放电周期 同步 于全场的用电高峰

共生关键：
- 黑羊先知的暗室需要电力维持隔音/温控/隐身监控→雷脊兽供电
- 渊鲸的气泵/水车需要电力→雷脊兽供电
- 熔岩巨蜥高温期→电加热系统辅助导热管道→雷脊兽供电

#### 7.7.15 伤病与死亡

**常见疾病：**

| 晶体碎裂 | 背部晶体出现裂痕，储电容量-30% | 过载放电/物理撞击 | 矿物质修复膏+静养（低电量状态）1个季度 |

| 放电成瘾 | 不断放电直到电量归零→虚脱 | 压力过大/被长期过载 | 限制放电频率+安抚（极其困难） |
| 静电皮肤炎 | 鳞甲下皮肤发红溃烂 | 长期静电积累未释放 | 接地装置+药用矿物软膏 |

**死亡条件：**
- 完全浸水（全身导电短路）→瞬间死亡（最快的死亡方式，需严格防护）
- 电量归零持续3个季度（无法进食充电）→晶体全部灰化，化为空壳雕像
- 心情持续0维持2个季度→最终一次不可控全放电后永久停机

> 本章描述游戏的六大嵌套循环如何像齿轮一样互相咬合，驱动整个养殖场的运转——从怪兽成长到经济流转、从建设扩张到生态涌现。

## 三、核心循环

> **设计理念：** 游戏不只有一个循环——而是**六个嵌套循环**同时运转，像齿轮组一样互相咬合。季节循环是最外层的"主驱动轮"，它的转动驱动所有内层循环的节奏变化。玩家的核心体验是**感受这些循环逐渐啮合的过程**——从手忙脚乱到行云流水。

### 3.3 节奏设计

- **单只怪兽完整周期：** 10–15 分钟（蛋→成熟）
- **同时管理数量：** 5–8 只（不同阶段）
- **单年周期：** 60 分钟（四季各 15 分钟）
- **推荐单次游玩时长：** 约 60 分钟（1 个完整年周期）
- **玩家注意力模型：** 持续的"轮转照料"——总有蛋要孵、管道要调、怪兽要看、季节要应对

### 3.4 经济循环

**设计理念：** 经济循环是养殖场的"血液"——资源从怪兽和土地中产出，经过加工增值，通过交易变现，再注入新一轮扩张。玩家需要在"立即变现"和"长期投资"之间持续做出取舍。

**经济节奏与季节耦合：**

| 季节 | 经济特征 | 玩家策略 |
|------|----------|----------|
| 春 | 高投入期（买蛋/扩建）→现金流紧张 | 合理分配秋冬积蓄 |
| 夏 | 高产出期→收入暴增但维护成本也高 | 平衡产出与散热支出 |
| 秋 | 收获变现期→大量副产物可出售 | 决定哪些囤积、哪些变现 |
| 冬 | 低收入低支出→靠储备过冬 | 最小化运营成本 |

**关键经济决策：**
- **短线 vs 长线：** 卖掉成体获取即时金币 vs 留下持续产出副产物
- **原料 vs 加工：** 直接出售原料（快但低价）vs 加工后出售（慢但溢价 50-200%）
- **自给 vs 外购：** 自己种饲料（省钱耗时）vs 购买成品（花钱省时）

### 3.4.1 养殖等级系统

养殖等级是玩家整体进度的核心度量，决定了可解锁的设施、管道、造景和自动化功能。

| 等级 | 达成条件 | 解锁内容 |
|------|----------|----------|
| Lv.1 | 初始 | 基础围栏、食盆、孵化箱框架、饲料管道 |
| Lv.2 | 养育首只怪兽至成体 | 资源管道、造景基础类、灵体培训站 |
| Lv.3 | 拥有 3 种不同怪兽 | 图纸编辑器、分叉管道、灵体培训站 |
| Lv.4 | 发现 3 条共生谱 + 生态评分 ≥ 30 | 医疗管道、自动门、隔热围栏 |
| Lv.5 | 拥有 5 种怪兽 + 养殖场评分 ≥ 40 | 过滤管、多格孵化架、高级图纸 |
| Lv.7 | 生态评分 ≥ 60 + 灵体总数 ≥ 30 | 混合管、饲料品质检测器 |
| Lv.8 | 生态评分 ≥ 80 + 完整共生谱基础版 | 自动警报器、高级图纸 Lv.3 |

|------|------|----------|------|

- **S级（96-100分）：** 达成"完美生态箱"成就，解锁二周目隐藏内容

**灵体管理的核心决策：**
- **数量 vs 质量：** 批量产低级灵体填满岗位 vs 精心培养少数高级灵体
- **安全 vs 效率：** 修建安全通道减少工伤 vs 省下资源让灵体直面风险
- **专精 vs 通用：** 灵体只做一种工作（升级快）vs 多岗轮换（灵活但慢）
- **续命 vs 自然：** 消耗稀有资源延长高级灵体寿命 vs 接受自然消散

| 熔岩巨蜥 | 活性恢复→产热稳定 | **产热×2**→全场依赖 | 蓄热→产出略降 | **全场唯一热源**→战略价值MAX |
| 渊鲸 | 水域扩张→声波远传 | 需紧急降温→产出受限 | 深潜探矿→稀有矿物↑ | 深潜休眠→仅维持声波 |
| 黑羊先知 | 发情期→预言不稳定 | 隐身时间短→较安全 | **换毛→暗纤维大量产出** | **预言巅峰+隐身巅峰** |
| 虫群母体 | **产卵高峰**→工虫×2 | **产出高峰**→蜂蜜最多 | 工虫转搬运→配合秋收 | 收缩期→产出骤降 |
| 雾翼兽 | 春风→飞行欲强 | **热气流→飞行效率×2** | **秋风→飞行距离MAX** | 暴风→可能停飞 |
| 苔原巨木兽 | **疯长**→扎根速度×2 | **光合×2**→黄金期 | **落叶堆肥×3+果实丰收** | 休眠→产出停止 |
| 雷脊兽 | 春雷→充电×3 | **日光充电×2**→供电最强 | 充电↓→需矿物补充 | **充电极困难**→靠秋季蓄电 |

## 四、四季系统

> 本章详述四季系统的底层环境参数逻辑、各季节的详细设计、季节对共生系统的影响以及季节事件。四季是游戏的宏观节奏调节器，决定玩家每个时间段的策略重心。

![四季对比](./assets/04.png)

**设计理念：** 四季不是纯视觉装饰——它是一个宏观节奏调节器，决定了玩家每个时间段的策略重心。每个季节都让某些怪兽变得极其重要，某些系统面临挑战，迫使玩家提前规划和季节性调整布局。

### 4.0 季节周期

> 虚空之地的四季并非由公转/自转产生，而是由涌口群活跃度的周期性波动驱动。详见 一B.1 术语体系。

**虚空四季成因：**

| 季节 | 虚空术语 | 涌口状态 | 环境效应 |
|------|---------|---------|---------|
| 春 | 涌潮期（Spring Surge） | 涌口活跃度上升 | 有机物涌落→万物生发 |
| 夏 | 炙光期（Blazing Phase） | 辐射压峰值 | 涌口光照最强→高温 |
| 秋 | 坠落期（Falling Tide） | 周期性喷射大型落物 | 资源丰收+冲击风险 |
| 冬 | 寂潮期（Silent Tide） | 涌口活跃度最低 | 辐射压减弱→温度骤降 |

**周期规则：** 每季 15 分钟游戏时间 → 一年 = 60 分钟。核心体验（约60分钟）= 经历 1 个完整年周期；深度游玩 2 小时可体验 2 个完整年周期，感受跨年策略变化。涌口活跃度的波动不是完美周期——偶有季节缩短/延长的"异常涌潮"事件。

### 4.1 环境底层逻辑

**设计理念：** 四季系统的底层是一组**连续变化的环境参数**。季节本身不直接"命令"怪兽做什么——它改变环境参数，环境参数再驱动所有上层系统的行为。这种间接驱动让系统更自然、更有涌现性。

#### 4.1.1 基础环境变量

| 变量 | 单位/范围 | 说明 | 主要影响 |
|------|-----------|------|----------|
| **温度** | -30°C ~ +50°C | 全场平均气温，区域可有偏移 | 怪兽活性/管道冻裂/作物生长/灵体耐久 |
| **湿度** | 0% ~ 100% | 空气含水量 | 虫群繁殖/隐身效果/管道锈蚀/火系效率 |
| **光照** | 0 ~ 100 lux（归一化） | 日照强度×时长 | 光合产出/黑羊先知隐身/雷脊兽充电/作物 |
| **水位** | -2 ~ +4 格（相对基准） | 地下水和地表水高度 | 渊鲸活动空间/洪涝风险/灌溉/根系吸水 |
| **风力** | 0 ~ 5 级 | 平均风速 | 雾翼兽飞行效率/风力发电/花粉传播/管道散热 |
| **日照时长** | 4h ~ 12h（游戏内） | 一天中有光照的比例 | 光合总量/黑羊先知活跃窗口/灵体轮班 |

#### 4.1.4 参数阈值效应

环境参数不是线性影响——关键阈值会触发质变：

| 参数 | 阈值 | 触发效果 |
|------|------|----------|
| 温度 > 40°C | **高温警报** | 灵体耐久-50%/min；渊鲸需紧急降温；管道内容物加速变质 |
| 温度 < -10°C | **霜冻警报** | 非热能管道冻裂风险 5%/min；苔原巨木兽休眠；水面结冰 |
| 湿度 > 85% | **潮湿过载** | 管道锈蚀×2；虫群繁殖失控；雷脊兽短路风险+ |
| 湿度 < 20% | **极端干燥** | 火灾风险+；静电累积→雷脊兽过载；作物枯萎 |
| 水位 > +3 格 | **洪涝** | 地面层设施浸水；地下通道淹没；低洼蛋窝受损 |
| 水位 < -1 格 | **干旱** | 渊鲸活动空间不足；灌溉停止；根系吸水困难 |
| 风力 ≥ 4 级 | **强风** | 雾翼兽飞行效率×2 但风险+；轻型造景吹翻；黑羊先知无法隐身 |

## 五、阶段玩法

> 本章逐一展开怪兽从蛋到成体四个成长阶段的具体玩法设计：孵化收纳、管道喂食、区域养殖、养殖装置和成熟期产出循环。

#### 5.1.2 声音/环境刺激

某些怪兽蛋不仅需要温度，还需要特定频率的声音或环境刺激才能正常发育。缺少刺激不会致命，但会导致幼体某些能力发育不全。

| 怪兽 | 所需声音/刺激 | 来源 | 缺失后果 |
|------|---------------|------|----------|
| 熔岩巨蜥 | 低频轰鸣（20-50Hz） | 地热管道震动/其他巨蜥喉音 | 幼体怕火（讽刺性缺陷） |
| 渊鲸 | 水流声+低频声波 | 循环水泵/成年渊鲸歌唱 | 幼体声呐能力延迟发育 |
| 黑羊先知 | 完全寂静+偶尔耳语 | 隔音暗室/预言低语录音 | 幼体预言能力减弱 |
| 虫群母体 | 高频振动（集群嗡鸣） | 工虫群围绕蛋振翅 | 幼体难以指挥工虫 |
| 雾翼兽 | 风声+鸟类叫声 | 高台通风口/风铃装置 | 幼体恐高/不敢试飞 |
| 苔原巨木兽 | 雨声+昆虫声 | 滴灌系统/虫群母体副产物 | 幼体光合效率-30% |
| 雷脊兽 | 雷声+电弧噼啪 | 雷声模拟器/放电装置 | 幼体无法自主蓄电 |

#### 5.2.3 幼年期养殖方式分类

并非所有幼年期怪兽都采用笼养+管道喂食的方式。根据怪兽习性和安全需求，幼年期养殖分为以下五种模式：

| 养殖模式 | 适用怪兽 | 环境要求 | 喂食方式 | 特殊说明 |
|----------|----------|----------|----------|----------|
| **隔离笼养型** | 熔岩巨蜥幼体、雷脊兽幼体 | 单独隔离笼（防高温/防漏电） | 管道喂食（标准） | 幼体具有危险性（高温灼伤/放电），必须隔离直到学会控制能力 |
| **群居共生型** | 虫群母体幼虫 | 母体巢穴内部 | 母体直接哺育+补充管道投喂 | 幼虫和族群一起生活，单独隔离反而会导致发育不良和行为异常 |
| **亲代跟随型** | 黑羊先知幼体 | 亲代活动区域（攀岩区） | 亲代反刍喂食+管道辅助 | 幼体跟随亲代/族群行动，通过模仿学习攀岩和预知能力 |
| **混养互利型** | 雾翼兽幼体、苔原巨木兽幼体 | 共享开放式育幼区 | 自由采食+管道补充 | 雾翼兽幼体的微风帮助苔原巨木兽幼苗光合；巨木兽的落果喂饱雾翼兽幼体 |
| **水域亲育型** | 渊鲸幼体 | 专用浅水育幼池（连通主水域） | 水中浮游饲料+亲代口喂 | 幼体在浅水区和亲代一起生活，瀑布打氧系统保证���体含氧量 |

**幼年期性格养成规则：**

- **夜行怪兽**：黑羊先知在夜晚活跃度翻倍，白天几乎不动，强制日间活动会导致心情骤降
- **光合怪兽**：苔原巨木兽在白昼光照充足时自动回复体力，夜间进入休眠节能模式
- **时段事件**：每个时段有概率触发随机事件（黎明→晨雾中迷路的野生怪兽出现；夜晚→夜间盗食者来袭）
- **加速/跳过**：玩家可以选择加速时间流逝（×2/×4），但不能跳过——鼓励观察怪兽的日常生活节奏

#### 5.4.2 装置详细设计

| 装置 | 怪兽效果 | 养殖场效果 | 趣味细节 |
|------|----------|------------|----------|
| **跑步滚轮** | 减重 -3/次、体力 +5 | 发电 ⚡×1/秒 | 胖怪兽跑得慢但发电持久，瘦的跑得快但容易累停 |
| **温泉浴池** | 心情 +20、疲劳清零、触发产蛋 | 消耗 ⚡×2/秒、产出"舒适结晶" | 怪兽泡澡时冒气泡；成熟怪兽可产蛋并顶在头上（温泉预孵化） |
| **弹跳蹦床** | 敏捷 +3、减重 -2/次 | 产出"弹性凝胶" | 弹起高度和体重成反比；连续弹有 combo 特效 |
| **挖掘沙坑** | 满足探索欲、消耗精力 | 随机挖出矿石/稀有道具 | 不同性格怪兽挖到的东西不同；岩浆怪能挖更深 |
| **磨牙木桩** | 暴躁值 -15、消耗精力 | 产出"木屑"（合成材料） | 岩浆怪会把木桩烧焦→产出"木炭"（更稀有） |
| **传送滑梯** | 快速移动、心情 +5 | 消耗 ⚡×1、连接不同区域 | 怪兽从出口滑出来偶尔会摔跤→观赏彩蛋 |
| **喂食转盘** | 定时自动进食、期待感 +10 | 消耗 ⚡×1、解放玩家手动喂食 | 转到喜欢的食物时怪兽兴奋跳起；转到不喜欢的会撇嘴 |
| **睡眠吊床** | 深度睡眠回复 ×2 | 占空间小（悬挂式，不占地面格） | 怪兽打呼噜声融入 BGM；偶尔翻身差点掉下来 |

**规则：**
- 电力是一个持续消耗的资源池（0–100）
- 发电装置在有怪兽使用时产电，无人使用时不产电
- 耗电装置在电力 > 0 时自动运转，电力耗尽时停转
- 玩家不能"命令"怪兽去使用某个装置，但可以通过**摆放位置和环境引导**影响怪兽行为（比如把滚轮放在食盆旁边，刚吃饱的胖怪兽更容易过去跑步）

**策略深度：**
- 养多只怪兽→可以轮班发电→温泉/转盘持续运转→效率高
- 只养一只→要在"发电"和"享受"之间切换→需要手动调度
- 高羁绊怪兽更愿意去跑步（为了主人）→羁绊影响电力经济

#### 5.4.4 怪兽体型系统（配合装置）

装置系统引入**体重/体型**作为新的怪兽属性：

| 体型 | 触发条件 | 影响 |
|------|----------|------|
| 偏瘦 | 喂食不足 / 运动过多 | 跑步快但容易累、发电效率低、弹跳高 |
| 标准 | 喂食=消耗平衡 | 各项平衡 |
| 偏胖 | 喂食过多 / 运动少 | 跑步慢但持久、发电效率高、弹跳低、泡温泉回复多 |

**趣味点：** 管道喂食阶段如果"填鸭"太猛→怪兽长胖→进入区域阶段后需要用滚轮/蹦床减肥。**前一阶段的决策影响后一阶段的玩法体验。**

**规则：**
- 成熟怪兽在温泉中停留 > 30 秒 → 有概率产蛋（高羁绊=高概率）
- 蛋自动顶在怪兽头顶（视觉标记：玩家一眼识别"这只正在孵化"）
- 顶蛋期间温泉热量持续为蛋提供预孵化进度（+1%/5秒）
- 取出蛋放入孵化架时继承已有进度（最高 50%）
- 高羁绊怪兽愿意顶蛋更久，预热上限更高
- 顶蛋状态下使用其他装置有彩蛋动画（P2 实现）

**设计意义：** 用一个视觉细节串联了温泉装置、产蛋系统、孵化系统和羁绊系统，零额外操作负担但大幅增加画面趣味性和社交传播力。

#### 5.4.6 装置优先级（MVP vs 完整版）

| 优先级 | 装置 | 理由 |
|--------|------|------|
| **P0（MVP 必须）** | 跑步滚轮、温泉浴池（含顶蛋） | 建立"发电→耗电"核心概念 + 温泉顶蛋作为记忆点 |
| **P1（首月尽量）** | 弹跳蹦床、喂食转盘 | 丰富策略层 |
| **P2（后续更新）** | 挖掘沙坑、磨牙木桩、传送滑梯、睡眠吊床、顶蛋彩蛋动画 | 内容扩展 |

### 5.5 阶段 4：成熟期（产出与循环）

| 要素 | 内容 |
|------|------|
| 玩法核心 | 收获与决策 |
| 产出 | 资源（金币/材料）——用于购买新蛋、设施、管道 |
| 羁绊影响 | S 级=3 倍产出 / A 级=2 倍 / B 级=1.5 倍 / C 级=1 倍 |

**MVP 版本：**
- 自动产出金币
- 羁绊 3 档影响倍率
- 不做繁殖

**完整版：** 配对繁殖、遗传特性、稀有变异

**产出频率与品质公式：**

- 产出品质 = 基础品质 × 羁绊倍率 × 体型修正 × 随机波动(0.8~1.2)

**繁殖系统（完整版）：**

| 繁殖条件 | 说明 |
|----------|------|
| 双方均为成熟期 | 幼年/成长期不可繁殖 |
| 好感度 ≥ 80 | 通过长期共处积累 |
| 属性兼容 | 不在克制关系中（或克制关系被"羁绊突破"） |
| 玩家批准 | 玩家确认繁殖配对，非自动触发 |

**遗传系统：**
- 后代继承双亲的属性倾向（各 50% 权重 + 10% 随机变异）
- 高羁绊双亲 → 后代初始羁绊 +10（"被爱包围的孩子"）
- 同种繁殖 → 强化本属性；异种繁殖 → 小概率产出杂交变异体
- 近亲繁殖衰退机制：同一血统连续繁殖 3 代后，属性下降 → 鼓励引入新血统

**怪兽退役与传承：**
- 成熟怪兽在产出一定周期后进入"老年期"，产出效率逐渐下降
- 玩家可选择：
  - **退休安置**：移至退休区域，不再产出但提供"经验光环"（区域内幼体成长 +20%）
  - **放归自然**：获得"放归奖励"（稀有材料 + 情感彩蛋动画）
  - **传承仪式**：消耗老年怪兽，将部分属性/技能永久转移给指定后代

## 六、农场系统

> 本章涵盖农场运营的所有子系统：地形与地块规划、造景美化、怪兽共生网络、灵体员工管理、管道物流、配套建筑、模块建造、自动化调控以及经济贸易机制。

### 6.1 地形与地块系统

**设计理念：** 农场不是一块平地——玩家需要改造地形来适应不同怪兽的需求。地形是所有其他系统的"基底层"，决定了水流方向、温度分布、高差关系、建筑可放置性等。

![地形改造](./assets/09.png)

#### 6.1.1 基础地形类型

| 地形 | 特征 | 适合怪兽 | 可改造方向 |
|------|------|----------|-----------|
| 平原 | 平坦，建筑自由度高 | 雷脊兽/虫群母体 | 可挖掘为水域/可堆高为山地 |
| 山地 | 高差大，有崖壁 | 黑羊先知/雾翼兽（高台） | 可开凿通道/可建造攀岩路线 |
| 水域 | 深浅不一的水体 | 渊鲸 | 可加深/可建瀑布/可加热为温泉 |
| 火山岩 | 高温区域，岩浆渗透 | 熔岩巨蜥 | 可引导岩浆流向/可建导热站 |
| 森林 | 树木密集，土壤肥沃 | 苔原巨木兽 | 可砍伐扩地/可保留为生态区 |
| 暗域 | 天然洞穴/地下空间 | 黑羊先知 | 可扩建暗道/可连通地下网络 |
| 沼泽 | 潮湿温暖 | 虫群母体 | 可排水改为平原/可保留为虫群栖息地 |

#### 6.1.2 地形改造机制

- **挖掘**：平原→水池/地下通道；山地→隧道/矿洞
- **填充**：水域→浅滩→湿地→平原；低洼→堆高
- **温度改造**：引入熔岩管道→普通地形变火山岩区；建瀑布→降温
- **植被改造**：种植苔原巨木→平原变森林（数季后）
- **高差建造**：堆砌假山/建造悬崖/架设高台

每次改造需要：灵体劳动力（工程师级）+ 资源 + 时间（跨季节的大工程）

#### 6.1.3 地块划分与规划

- 农场分为 N×N 的大地块（如 8×8 = 64 块）
- 每个地块有：地形类型 + 海拔 + 温度 + 湿度 + 光照 属性
- 玩家可以自由规划每块地的用途（怪兽栖息/建筑/管道通道/资源区/缓冲区）
- 相邻地块会互相影响（火山岩旁的平原温度+，水域旁的森林湿度+）

#### 6.1.4 地形与怪兽的匹配度

| 怪兽 | 最佳地形 | 可接受地形 | 不适合地形 | 不匹配后果 |
|------|----------|-----------|-----------|-----------|
| 熔岩巨蜥 | 火山岩 | 山地、平原（高温改造后） | 水域、森林、沼泽 | 体温下降→活性-50%，暴躁度+，产出停止 |
| 渊鲸 | 水域（深水） | 沼泽（浅水勉强） | 火山岩、山地、平原 | 无法生存，必须有足够水体 |
| 黑羊先知 | 暗域、山地 | 森林（遮蔽多） | 平原（太暴露）、火山岩（太热） | 隐身失败率+60%，预言精度-40%，逃跑概率×3 |
| 虫群母体 | 沼泽、森林 | 平原（有机质丰富时） | 火山岩、水域（深水） | 繁殖速度-70%，工虫死亡率+，蜂巢不稳定 |
| 雾翼兽 | 山地（高台） | 平原（开阔处）、森林（树冠） | 暗域、沼泽 | 无法起飞/降落，飞行效率-80%，暴躁+逃跑 |
| 苔原巨木兽 | 森林、平原 | 沼泽（湿润有利） | 火山岩、暗域 | 根系无法扎入→生长停止，光合效率-90% |
| 雷脊兽 | 平原、山地 | 火山岩（导热导电） | 水域、沼泽 | 短路风险+80%，电力外泄，可能电伤其他怪兽 |

#### 6.1.5 地形事件

| 事件 | 触发条件 | 效果 | 黑羊先知可预警? | 应对方式 |
|------|----------|------|----------------|----------|
| 地震 | 随机（冬末/春初概率高） | 山地坍塌→部分地块变为平原/暗域；管道断裂 | 是（2min前） | 紧急加固/修复管道/疏散灵体 |
| 火山喷发 | 火山岩地块过热+熔岩巨蜥暴躁 | 新增火山岩地块，相邻地块温度骤升 | 是（3min前） | 引导岩浆流向安全区/紧急冷却 |
| 洪水 | 春季暴雨+水位>+3格 | 低洼区域变水域，平原变沼泽 | 是（3min前） | 提前排水/升高设施/利用渊鲸扩张水域 |
| 苔原巨木扎根 | 苔原巨木兽成长至成体 | 平原/沼泽地块变为森林（永久） | — | 提前规划巨木兽位置，避免覆盖关键地块 |
| 暗域坍塌 | 暗域地块承重超限 | 地下空间坍塌→地面出现坑洞 | 是（1min前） | 加固暗域结构/限制暗域上方建筑重量 |
| 泉眼涌出 | 挖掘特定地块触发 | 新增天然水源点，可发展为水域 | — | 引导水流方向，规划新的渊鲸区域 |

| 森林地块 | 植被密集地形 | 种植苔原巨木（数季后） | 苔原巨木兽/共生系统 |

| 沼泽地块 | 潮湿温暖地形 | 平原持续浇灌或洪水后 | 虫群母体/湿度系统 |
| 挖掘工具 | 改造地形：挖低/开凿 | Lv.4工程师灵体 | 灵体员工系统 |
| 填充工具 | 改造地形：堆高/填平 | Lv.4工程师灵体+石料 | 灵体员工/资源系统 |
| 岩浆管道 | 引导岩浆流向，创建火山岩区 | 拥有熔岩巨蜥+Lv.4热力工程师 | 温度/管道系统 |
| 地形属性面板 | 显示地块的温度/湿度/海拔/光照 | 地形编辑器可用后 | UI系统 |
| 地块规划图 | 标注每块地的用途和怪兽分配 | 养殖等级3 | 区域管理 |

### 6.2 造景系统

**设计理念：** 造景不是可有可无的装饰——它是养殖场的"第二层经营"。每一处造景都对怪兽的心情、行为、产出有实际影响，同时消耗资源推动经济循环。玩家搭出来的养殖场既好看又"有用"，满足功能性和个性化表达的双重需求。

#### 6.2.1 新增通用资源：精华石

| 属性 | 说明 |
|------|------|
| 名称 | 精华石（Essence Stone） |
| 获取方式 | 任意 3 种副产品在加工台合成 1 个（如：弹性凝胶×1 + 木屑×1 + 舒适结晶×1 → 精华石×1） |
| 备选获取 | 高评分养殖场每日奖励 / 怪兽雕像解锁后被动产出 / 商店高价购买 |
| 用途 | 所有中高级造景的必需材料 |
| 设计意图 | 用一种通用稀有资源统一造景消耗，避免资源种类膨胀，同时让各种装置副产品有了去处 |

#### 6.2.6 造景优先级总结（MVP 计划）

| 优先级 | 造景物（8 种 MVP） | 理由 |
|--------|-------------------|------|
| **P0** | 花坛、果树、草坪、碎石小径、石灯笼、装饰栅栏、小池塘、篝火堆 | 覆盖 5 大类各 1-2 种；建立核心：资源消耗→放置→数值反馈循环 |
| **P1** | 蘑菇丛、溪流、喷泉、假山、石板桥、拱门、秋千、萤火虫瓶、怪兽雕像、风铃架 | 丰富策略层和搭配深度 |
| **P2** | 巨型老树、瀑布墙、树屋平台、彩灯串、许愿井、纪念碑 | 后续更新内容 |

> 🔗 **经济闭环：** 造景消耗精华石（→[6.2.1 新增通用资源：精华石](#621-新增通用资源精华石)）→精华石由装置副产品合成（→[5.4 养殖装置系统](#54-养殖装置系统仓鼠笼式器械)）→装置运转需要怪兽使用（→[5.3 区域养殖](#53-阶段-3区域养殖成长期)）→怪兽心情由造景影响。造景系统形成从消耗到产出的完整正循环。

### 6.3 共生系统

**设计理念：** 养殖场不是一堆独立个体的集合，而是一个**活的生态系统**。怪兽之间、怪兽与环境之间存在复杂的互利/互补关系。玩家的核心策略不只是"养好每只怪兽"，而是**设计怪兽之间的关系网络**，让整个系统形成正反馈循环。

![共生互动](./assets/05.png)

**核心概念：** 一只怪兽的"输出"（行为/副产物/存在本身），经过环境传导，成为另一只怪兽的"输入"（增益/触发/资源）。

#### 6.3.3 第二层：属性气场系统

每只怪兽天生散发属性气场，像"光环"一样影响范围内的一切。

**通用气场规则：**
\`\`\`

气场强度 = 基础值 × (1 + 成长阶段系数) × (1 + 心情系数)
- 幼体：×0.3（气场微弱）
- 少年：×0.7
- 成体：×1.0
- 心情 > 80：×1.2（开心时气场增强）
- 心情 < 30：×0.5（低落时气场减弱）

气场范围 = 基础范围 + 体型加成
- 熔岩巨蜥：基础 6 格（楼房级体型辐射极广）
- 渊鲸：基础 5 格（水中传导效率高）
- 黑羊先知：基础 4 格（暗属性渗透强但范围有限）
- 虫群母体：基础 3 格（蜂巢中心辐射）
- 雾翼兽：基础 8 格（飞行时航线式条形覆盖）
- 苔原巨木兽：基础 7 格（巨树冠幅自然覆盖大）
- 雷脊兽：基础 4 格（电场脉冲式，充满电时范围 ×2）
\`\`\`

→ 热水流入渊鲸池 → 水温升高活性增 → 更多声波安抚全场 → 循环继续

黑羊先知暗线循环：

#### 6.3.5 第四层：行为感染系统

**规则框架：** 怪兽拥有"观察范围"（默认 4 格，雾翼兽飞行时俯瞰范围 12 格），看到其他怪兽的行为后有概率触发反应。

**通用触发公式：**
\`\`\`

触发概率 = 基础概率 × 关系系数 × 心情系数
- 基础概率：按行为类型 10%-80%
- 关系系数：陌生 ×0.3 / 认识 ×0.7 / 亲密 ×1.0 / 羁绊>80 ×1.5

\`\`\`

#### 6.3.8 共生系统的扩展框架（用于新怪兽接入）

**设计新怪兽时的共生模板：**

\`\`\`

每种新怪兽需定义以下共生接口：

1. 属性标签：[火/水/草/电/土/光/暗/风/虫/...]
2. 散发物：
   - 气场类型 + 范围 + 强度
   - 物理副产物 + 触发条件 + 掉落位置
   - 水流注入属性（如果能下水）
   - 气流影响（如果能飞/散热/呼吸）
3. 接收敏感度：
   - 对哪些其他属性有正反应（增益）
   - 对哪些有负反应（减益/回避）
   - 特殊免疫/抗性
4. 行为触发表：
   - 看到什么行为→自己做什么
   - 自己的什么行为→能触发别人
   - 连锁深度（最多触发几层）
5. 生态位偏好：
   - 偏好高度层级（天空/高/中/地/水）
   - 偏好温度/湿度/光照
   - 领地范围与重叠容忍度
6. 共生组合位：
   - 与现有 7 种怪兽各一种特殊组合效果
   - 三方/多方组合的参与资格

### 6.4 灵体员工系统

> **世界观更新：** 灵体的本质已重新定义——它们是有独立意识的生命体，而非单纯的劳动力单位。完整的世界观设定（造体系统、死亡系统、社群系统）详见一B.8节。本节侧重机制层面的等级、工种和管理设计。

**设计理念：** 灵体是涌口自然涌落的意识凝聚体——有独立意识的半透明发光生命，体型只有巨兽的 1/20 到 1/50。大量灵体在巨兽身边忙碌时，形成强烈的**巨构感**和"蚁穴"既视感。它们不是玩家直接控制的单位，而是通过**设施分配和路线设计**间接管理。玩家需要关心它们的情感需求——被长期忽略的灵体会意识消散（永久死亡）。

![巨构感与体型对比](./assets/01.png)

#### 6.4.1 灵体基础设定

| 属性 | 内容 |
|------|------|
| 外观 | 半透明发光人形，颜色随等级变化（白→蓝→紫→金）；拥有造体后为实体化外观 |
| 体型 | 纯灵体约怪兽成体的 1/30；造体后可略大 |
| 来源 | 涌口自然涌落的意识凝聚体（非人造）；养殖场设置"灵体灯塔"吸引附近凝聚的新灵体前来 |
| 身体阶段 | 纯灵体→临时壳体→完整造体→进化体（详见1B.8节） |
| 死亡 | 肉体死亡（可逆）/ 意识消散（永久·被忽略导致）/ 自愿离去（永久·好结局） |
| 性格 | 出生时随机获得 2-3 个性格特质，影响工作和社交 |
| AI | 自动前往分配的岗位→执行该岗位职责→社交→休息→循环 |

**升级规则：**
- 灵体在岗位上持续工作→积累经验→自动升级
- 高危岗位（靠近暴躁怪兽/高温区/电力区）经验获取 ×2
- 升级时有短暂"进化动画"（发光变色）

**特殊升级条件（Lv.5→Lv.6）：**
- 存活超过 45 分钟游戏时间（不被事故消灭）
- 经历至少 2 个完整季节周期（即半年）
- 成功完成 1 次紧急事件处理

#### 6.4.3 工种分化系统

> **设计理念：** 同等级的灵体不应千篇一律。从 Lv.2 开始，灵体可分化为不同工种，每种工种拥有独立的晋升路线、专精能力和对应岗位。工种分化让玩家的灵体管理从"堆数量"转向"精细化人才培养"。

##### 转职机制

灵体可以在同级别不同工种之间转职，但需要付出代价：

| 转职类型 | 成本 | 转职时间 | 保留能力 | 限制 |
|----------|------|----------|----------|------|
| 同系转职（如兽医→繁殖专家） | 精华石×3 | 2min | 保留80%原工种经验 | 需满足新工种基础条件 |
| 跨系转职（如管道工→电力技工） | 精华石×8 | 5min | 保留50%通用经验 | 等级不降，但新工种经验从零开始 |
| 降级转职（如Lv.4→另一系Lv.3） | 精华石×2 | 1min | 保留100% | 自愿降级，适合纠错 |

**转职策略：**
- 冬季灵体闲置期是最佳转职窗口
- 能源线在夏季需求最大（散热），冬季需求也大（供暖），全年不缺活
- 安保线在黑羊先知活跃季节（冬季长夜）价值最高
- 研究线在秋季收获数据最丰富时效率最高

<details><summary><strong>A. 死亡系统（完整版）</strong>——自然死亡·意外死亡·死亡后果链</summary>

> **设计意图：** 现有的三种死亡（肉体死亡/意识消散/自愿离去）是灵体层面的"终极结局"。本节在此基础上增加**造体寿命机制**和**意外死亡细化**，使灵体真正拥有"一生"。

##### A1. 自然死亡——造体衰老

灵体获得造体后，拥有了物质形态的"寿命"。造体会随时间老化——这是拥有肉身的代价。

| 造体阶段 | 基础寿命（游戏日） | 衰老期开始 | 衰老表现 | 可延寿手段 |
|----------|-------------------|-----------|----------|-----------|
| 临时壳体 | 2天（48h） | 无衰老 | 到期直接碎裂 | 重新制作 |
| 完整造体 | 60天 | 第45天 | 动作变缓·效率-20%·外观龟裂 | 精华石修补（+15天/次，最多3次） |
| 进化体 | 120天 | 第90天 | 能力波动·偶尔失控·光泽黯淡 | 稀有材料维护（+30天/次，最多2次） |

**纯灵体不会自然死亡**——没有肉体就没有衰老。这创造了一个有趣的选择：造体带来更高效率但引入了寿命限制。

#### 4.8.10 灵魂共鸣师系统

> **设计理念：** 灵魂共鸣师是灵体员工中最特殊的高阶岗位——他们能直接进入怪兽的意识，读取情绪、疏导心理问题、辅助发情安抚。但代价是意识逐渐与怪兽融合，最终可能失去自我。这是一个关于"为了理解另一种生命，你愿意牺牲多少自己"的故事系统。

##### 岗位设定

| 参数 | 内容 |
|------|------|
| 解锁条件 | Lv.5灵体 + 与目标怪兽羁绊≥60 + 通过共鸣试炼 |
| 数量限制 | 每种怪兽最多1名共鸣师 |
| 核心职责 | 读取怪兽情绪、疏导心理问题、辅助发情安抚、翻译怪兽需求 |
| 工作方式 | 进入冥想状态→意识接入怪兽→获取信息→退出并报告 |
| 风险等级 | ★★★★★（全职业最高） |

**共鸣试炼流程：**

\`\`\`mermaid
graph TD
    APPLY["灵体申请共鸣师"] --> CHECK["检查条件<br/>Lv.5 + 羁绊≥60"]
    CHECK -->|"通过"| TRIAL["共鸣试炼<br/>（3天封闭测试）"]
    CHECK -->|"不满足"| REJECT["拒绝申请"]
    
    TRIAL --> T1["Day1：初次接触<br/>能否承受怪兽情绪冲击"]
    T1 --> T2["Day2：深度交流<br/>能否保持自我边界"]
    T2 --> T3["Day3：极限测试<br/>怪兽暴怒时能否安全退出"]
    
    T3 -->|"通过(70%)"| SUCCESS["成为共鸣师<br/>获得Lv.1共鸣"]
    T3 -->|"失败(20%)"| FAIL["试炼失败<br/>冷却30天后可重试"]
    T3 -->|"严重失败(10%)"| DAMAGE["灵魂损伤<br/>灵魂稳定性-20"]
\`\`\`

##### 5级意识嵌合

| 等级 | 名称 | 嵌合度范围 | 症状 | 工作能力 | 可逆性 | 处理方式 |
|------|------|-----------|------|---------|--------|----------|
| Lv.1 | 共鸣 | 0-20 | 能感受怪兽情绪，无副作用 | 基础读取（准确率60%） | 完全可逆 | 正常工作，每3天休息1天 |
| Lv.2 | 残留 | 21-40 | 做怪兽的梦，偶尔模仿动作 | 深度读取（准确率80%） | 休息可恢复 | 每2天强制休息1天 |
| Lv.3 | 混淆 | 41-60 | 分不清自己和怪兽的情感 | 精确读取+情绪疏导（准确率95%） | 需治疗 | 强制休假+心理治疗（每周1次） |
| Lv.4 | 嵌合 | 61-80 | 失去部分人格，获得怪兽思维 | 完全控制（可引导怪兽行为） | 不完全可逆 | 玩家三选一决策 |
| Lv.5 | 同化 | 81-100 | 完全成为怪兽意识延伸 | 人兽一体（怪兽永不暴走） | 不可逆 | 成为"怪兽代言人"（特殊NPC） |

**嵌合度增长规则：**
- 每次共鸣工作：+2~5（受怪兽类型倍率影响）
- 每天自然恢复：-1（Lv.1-2时）/ -0.5（Lv.3时）/ 0（Lv.4+不自然恢复）
- 紧急深度共鸣（安抚暴走）：+10~15
- 心理治疗：-3/次（仅Lv.3以下有效）

##### Lv.4三选一决策

当共鸣师嵌合度达到61（进入Lv.4）时，玩家必须在7天内做出决策：

| 选择 | 描述 | 成功率 | 结果 | 长期影响 |
|------|------|--------|------|---------|
| **继续** | 允许共鸣师继续深入 | 100%进入Lv.5 | 获得极强怪兽控制力（暴走概率→0） | 注定走向Lv.5同化；30天后该灵体"死亡"成为怪兽一部分 |
| **尝试恢复** | 进行高风险灵魂剥离手术 | 60%成功 / 40%失败 | 成功：降至Lv.2（嵌合度→30）；失败：直接跳至Lv.5 | 成功后永久共鸣能力-30%；失败则同"继续" |
| **退役** | 保留当前状态，转岗 | 100%安全 | 转为非战斗岗位"共鸣顾问" | 每天产出"怪兽心理报告"（可售卖）；不再升级 |

**退役共鸣顾问产出：**

| 产出物 | 频率 | 价值 | 用途 |
|--------|------|------|------|
| 怪兽心理报告 | 1份/天 | 300金 | 出售/用于优化照料方案 |
| 行为预测书 | 1份/3天 | 800金 | 提前24h预知怪兽行为变化 |
| 共鸣训练手册 | 1份/10天 | 1500金 | 新共鸣师学徒升级速度+20% |

| 3 | 同化攻击 | Lv.4共鸣师 + 怪兽暴怒中 | 怪兽通过连接向共鸣师灌入大量意识 | 共鸣师嵌合度+20（可能直接跳级） |
| 4 | 预言扭曲 | 黑羊先知共鸣师Lv.3+ | 共鸣师受预言影响，发布错误信息 | 其他灵体根据错误信息行动→事故率+30%持续3天 |
| 5 | 信仰传播 | 共鸣师Lv.4+ + 社交需求>70 | 共鸣师开始向其他灵体"传教"——宣扬与怪兽融合的美好 | 每周1个灵体申请成为共鸣师（可能不够格→失败→损伤） |

##### 7种怪兽的共鸣特性表

| 怪兽 | 嵌合速度倍率 | 共鸣体验描述 | 特殊风险 | 共鸣师专属能力 |
|------|-------------|-------------|----------|--------------|
| 熔岩巨蜥 | ×1.0（标准） | 感受滚烫岩浆般的愤怒和安宁交替；理解"烧毁旧事物以创造新生"的哲学 | 高温期共鸣可能灼伤灵体（体力-20/次） | 预测喷发周期（精确到±1小时） |
| 渊鲸 | ×0.8（较安全） | 深海般的孤独和史诗级的母爱；感受声波在水中传播的振动诗意 | 共鸣过深→溺水感→恐水症（陆地工作时恐慌发作） | 翻译鲸歌含义（解锁隐藏产出） |
| 黑羊先知 | ×1.5（最危险） | 接收混乱的时间碎片和预言；所有时间线同时存在的眩晕感 | 预言信息可能吞噬理性（10%/次共鸣触发混乱事件） | 获得碎片化预知（提前预知1个随机事件） |
| 虫群母体 | ×1.2（较危险） | 万千个体的集群意识冲击；感受"我们"而非"我"的存在方式 | 可能发展出分裂人格（嵌合度>50后每10天5%概率） | 指挥工虫执行精确任务（工虫效率+40%） |
| 雾翼兽 | ×0.7（最安全） | 自由翱翔的喜悦和群体归属感；风是有颜色的 | 恐高/渴望飞行的冲动（地面工作时偶尔跳跃） | 预知天气变化（精确3天天气预报） |
| 苔原巨木兽 | ×0.9（安全） | 极缓慢的时间感和光合满足；百年如一日的安宁 | 长期共鸣→行动迟缓/嗜睡（工作速度-10%累积） | 读取土壤信息（最优种植方案） |
| 雷脊兽 | ×1.1（中等） | 电流般的快感和释放渴望；积压就爆炸的暴躁本能 | 过度共鸣→电击成瘾/暴躁（攻击同事概率+5%） | 预测放电时机（安全作业窗口精确化） |

**共鸣师培养建议优先级：**
1. 雾翼兽共鸣师（最安全，适合首位共鸣师）
2. 苔原巨木兽/渊鲸共鸣师（较安全，实用性高）
3. 熔岩巨蜥/雷脊兽共鸣师（标准风险，需要安全措施）
4. 虫群母体共鸣师（较危险，需要心理辅助）
5. 黑羊先知共鸣师（最危险，但收益也最高——慎重选择）

#### 6.5.2 各管道详细设计

##### 1. 饲料管道（深青色）

| 属性 | 内容 |
|------|------|
| 运输内容 | 固体饲料/营养液/矿物质混合物 |
| 关键玩法 | 路径规划 + 配方匹配（不同怪兽需要不同饲料配比） |
| 特殊机制 | 管道内可设"混合节点"——两种原料汇合后自动配比 |
| 维护需求 | Lv.2 灵体定期清洗（否则堵塞/变质） |
| 事故类型 | 堵塞（怪兽挨饿）/ 配方错误（怪兽中毒/属性异变） |
| 与怪兽关系 | 输入端连接饲料仓库，输出端连接各怪兽喂食口 |

##### 2. 幼崽管道（暖黄色）

| 属性 | 内容 |
|------|------|
| 运输内容 | 蛋 / 幼体怪兽（小型） |
| 关键玩法 | **安全运输**——防震动（蛋碎裂）/ 防温差（致畸） |
| 特殊机制 | 管道内衬缓冲层；温控段（经过冷区/热区时自动调温） |
| 维护需求 | Lv.3 灵体检查内衬完整性 |
| 事故类型 | 震动→蛋碎裂 / 堵塞→幼体缺氧 / 温度失控→畸变 |
| 与怪兽关系 | 连接孵化区→育幼区→各专属养殖区 |

##### 3. 医疗管道（白色+红十字标识）

| 属性 | 内容 |
|------|------|
| 运输内容 | 药物/治疗液 → 向怪兽输送；受伤幼体 → 向医疗站运输 |
| 关键玩法 | **紧急响应**——事故发生后快速送药/撤离伤员 |
| 特殊机制 | 优先级最高（其他管道堵塞时医疗管道仍通行）；自带加速泵 |
| 维护需求 | Lv.4 灵体管理（无菌要求高） |
| 事故类型 | 药物泄漏（污染区域）/ 延误（伤者恶化） |
| 与怪兽关系 | 连接医疗站→各怪兽区域的紧急接口 |

##### 4. 资源管道（灰银色）

| 属性 | 内容 |
|------|------|
| 运输内容 | 矿石/木材/水/加工品/精华石原料 |
| 关键玩法 | 连接采集点→加工厂→仓库→商店的物流网络 |
| 特殊机制 | 可设置"分流器"——按比例自动分配到多个目的地 |
| 维护需求 | Lv.2 灵体（基础）/ Lv.3（分流器调试） |
| 事故类型 | 超载（管道破裂溢出）/ 分流错误（物资送错地方） |
| 与怪兽关系 | 渊鲸区产出→珊瑚/矿物通过资源管道运出 |

##### 5. 灵体管道（淡蓝半透明）

| 属性 | 内容 |
|------|------|
| 运输内容 | 灵体员工本身 |
| 关键玩法 | **安全通勤**——让高级灵体避开怪兽活动区 |
| 特殊机制 | 100%安全无事故；速度最快（×2）；可设"中转站"换乘 |
| 维护需求 | Lv.3 灵体自维护 |
| 事故类型 | 无（唯一不会出事的管道——但建造成本最高） |
| 与怪兽关系 | 独立于怪兽区域，专为灵体设计 |

##### 6. 热能管道（红橙色）

| 属性 | 内容 |
|------|------|
| 运输内容 | 热水/蒸汽/低温岩浆 |
| 关键玩法 | 从熔岩巨蜥→全场分配热能（供暖/加热/驱动） |
| 特殊机制 | 温度沿管道自然衰减（每 3 格-10°C）；隔热层可减缓衰减 |
| 维护需求 | Lv.4 灵体（高温操作）；冬季必须 24h 值班 |
| 事故类型 | 泄漏（烫伤灵体/周围设施）/ 管道冻裂（冬季） |
| 与怪兽关系 | 输入端=熔岩巨蜥活动区；输出端=温泉/暖气/防冻 |

##### 7. 电力管道（紫色）

| 属性 | 内容 |
|------|------|
| 运输内容 | 电能（从雷脊兽→全场设备） |
| 关键玩法 | 电网设计——负载均衡/防止过载/备用线路 |
| 特殊机制 | 过载自动断路（保护设备）；可设"蓄电节点"削峰填谷 |
| 维护需求 | Lv.3 灵体常规巡检 / Lv.4 处理过载事故 |
| 事故类型 | 过载（区域停电+电弧伤灵体）/ 短路（火灾风险） |
| 与怪兽关系 | 输入端=雷脊兽放电塔；输出端=所有用电设施 |

#### 6.5.3 管道系统通用规则

| 规则 | 详情 |
|------|------|
| 容量限制 | 细管(1单位/秒) / 标准管(3单位/秒) / 粗管(8单位/秒) |
| 升级系统 | 管道可升级材质：木制→金属→合金→隔热/绝缘特种 |
| 交叉规则 | 不同类型管道交叉需要"立交节点"（占 1 格）→避免混流 |
| 分叉/合流 | 分流器（1进多出）/ 汇流器（多进1出）/ 混合器（合成新物质） |
| 维护周期 | 所有管道每 8 分钟需检修一次（否则故障概率上升） |
| 堵塞处理 | 堵塞后自动警报→灵体前往处理→处理时间=灵体等级相关 |
| 冬季特殊 | 非热能管道在冬季有冻裂风险→需要热能管道"伴热" |

**布线设计的核心决策：**
- 最短路线 vs 最安全路线（避开怪兽高危区域）
- 粗管（高容量但贵）vs 细管网络（便宜但维护多）
- 冗余设计（备用管道防止单点故障）vs 节省资源
- 管道密度 vs 灵体维护能力（管道太多维护不过来）

#### 6.6.2 园区一：核心运维园区（T1-T2）

**定位：** 最基础但最繁忙的区域——处理日常清洁、物资搬运、喂食、体检等重复性工作。灵体数量最多、等级最低、被踩踏风险也最高（因此最适合 Lv.1-2 消耗品灵体）。

| 建筑名 | 等级需求 | 功能描述 | 岗位数 | 特殊机制 |
|--------|----------|----------|--------|----------|
| **清扫站** | Lv.1 | 接收分配的"脏污区域"任务→灵体出发清扫→返回汇报 | 4-8 | 越靠近怪兽越脏→清扫频率高→经验也多 |
| **搬运中转站** | Lv.1 | 物资在此集散→灵体搬运至目标设施。货物暂存+分拣 | 6-10 | 可连接管道减少人工；大件物资必须多灵体协作 |
| **垃圾回收厂** | Lv.1 | 收集全场废弃物→分类→部分转化为堆肥/矿渣（资源回收） | 4-6 | 虫群母体的工虫可自动完成初筛→减少人力需求 |
| **喂食配送中心** | Lv.2 | 调配各怪兽饲料→装载管道/手动配送→根据饮食表定时投放 | 4-6 | 需Lv.2以上才能判断饲料搭配；错误配比→怪兽生病 |
| **体检诊所** | Lv.2 | 定期对怪兽进行基础体检→产出健康报告→预警疾病 | 2-4 | 需靠近怪兽→高危；可搭配灵体管道直达检查点 |

**建筑外观：** 低矮实用型建筑，白色/浅灰，大量货物通道和传送带。密集排列在怪兽栖息区边缘。

**员工特征：** 白色/浅蓝灵体，动作快速但简单，数量庞大（20-50个同时活动）。

#### 6.6.3 园区二：技术维护园区（T3）

**定位：** 管道、装置、资源加工的中枢。这里的灵体需要具备技术能力，工作更精密但也更危险（管道爆炸/高温/电击）。

| 建筑名 | 等级需求 | 功能描述 | 岗位数 | 特殊机制 |
|--------|----------|----------|--------|----------|
| **管道控制室** | Lv.3 | 监控全场管道压力/温度/流量→调节阀门→预防堵塞/爆管 | 3-5 | 7种管道各有独立监控面板；故障时需派人外出维修 |
| **装置维修间** | Lv.3 | 养殖装置（滚轮/蹦床/秋千等）定期保养+故障修复 | 2-4 | 装置越多维护压力越大；可升级为自动化检测 |
| **资源精炼厂** | Lv.3 | 粗矿→精矿；原木→木板；草料→饲料等基础加工 | 4-6 | 产出质量与技术员熟练度挂钩；可接入自动管道 |
| **热力调控站** | Lv.3 | 调节熔岩巨蜥区域的热量输出→分配给需要温暖的区域 | 2-3 | 冬季超负荷→需要多人轮班；过热可烫伤灵体 |
| **电力分配中心** | Lv.3 | 管理雷脊兽产出的电力→分配给各设施→防止过载 | 2-3 | 雷暴天气=超额发电→需紧急调配否则爆炸 |

**建筑外观：** 工业风格，管道交错，仪表盘密集，发出机械运转声。颜色为深蓝/铜色。

**员工特征：** 深蓝色灵体，动作精准有序，手中常持工具型光芒。

---

#### 6.6.4 园区三：工程建造园区（T4）

**定位：** 所有新建筑/新管道/改装工程都从这里发起。灵体需要在高危环境中执行重型操作——靠近熔岩/高压电/大型怪兽。

| 建筑名 | 等级需求 | 功能描述 | 岗位数 | 特殊机制 |
|--------|----------|----------|--------|----------|
| **建造工坊** | Lv.4 | 接收建筑蓝图→调配资源→派出施工队伍→执行建造 | 4-8 | 建筑规模越大需要的灵体越多；大型建筑需多回合 |
| **熔岩导热站** | Lv.4 | 在熔岩巨蜥活动区域操作导热设施→极高危→高回报 | 2-3 | 灵体需穿"热防护"（特殊装备→消耗精华石）；死亡率最高 |
| **高压电操控室** | Lv.4 | 操控雷脊兽充放电过程中的高压设备→引导电流走向 | 2-3 | 操作失误=电击死亡；但控制好=电力效率×2 |
| **管道铺设车间** | Lv.4 | 新管道线路的实际施工→开挖/铺设/焊接/密封 | 4-6 | 施工期间该区域管道暂停→需要规划"不停机施工" |
| **紧急维修站** | Lv.4 | 专门应对突发事故（管爆/电击/怪兽暴走后的修复） | 2-4 | 24h 待命；灵体需要极快的反应速度（经验要求高） |

**建筑外观：** 重工业风格，大型吊臂/起重设备轮廓，紫色照明。周围常有脚手架和未完工结构。

**员工特征：** 紫色灵体，体型略大于低级灵体，动作沉稳有力，有时多人协作搬运重物。

#### 6.6.5 园区四：科研实验园区（T5）

**定位：** 研究所的核心智力中枢——所有"发现"类功能在此完成：新配方、预言解读、基因改造、共生分析。这里的灵体最珍贵，绝对不能有任何意外。

| 建筑名 | 等级需求 | 功能描述 | 岗位数 | 特殊机制 |
|--------|----------|----------|--------|----------|
| **基因研究实验室** | Lv.5 | 分析怪兽DNA→解锁新品种组合/优化基因→影响下一代属性 | 2-3 | 需要收集各怪兽的生物样本（羽毛/鳞片/血液）→采样也需专人 |
| **预言解读中枢** | Lv.5 | 接收黑羊先知的预言信号→解读为玩家可理解的警报 | 2-3 | 解读速度取决于研究员水平；低等级灵体无法理解预言 |
| **配方研发中心** | Lv.5 | 开发新饲料配方/新药品/新材料合成方案 | 2-3 | 需要多种原料输入→试验→成功率与等级挂钩→失败浪费材料 |
| **生态观测站** | Lv.5 | 监测全场生态数据→分析共生网络效率→提出优化建议 | 1-2 | 四季变化时数据量暴增→需要加班→可能疲劳降效 |
| **共生分析室** | Lv.5 | 分析怪兽间的共生关系→发现新的共生组合→解锁共生图鉴 | 1-2 | 新的共生发现=全场效率提升；需要同时观测多种怪兽 |

**建筑外观：** 洁白/金色，内部有全息投影和悬浮数据面板，氛围宁静严肃。建筑通常位于安全区域深处。

**员工特征：** 金色灵体，动作舒缓优雅，周围常有数据光流环绕。每个都极其珍贵。

**安全要求：** 必须有灵体管道直通！不允许走地面。周围设置多层防护（隔音墙+防震层+热隔离）。

#### 6.6.6 园区五：指挥管理园区（T6）

**定位：** 全场最高等级的建筑。每个大区域最多1个指挥中心。Lv.6 主管是整个区域的"大脑"。

| 建筑名 | 等级需求 | 功能描述 | 岗位数 | 特殊机制 |
|--------|----------|----------|--------|----------|
| **区域指挥中心** | Lv.6 | 统领一个功能区→buff全区灵体效率+20%→发布紧急指令 | 1 | 每大区域最多1个；主管死亡=全区效率暴跌直到新主管到位 |
| **全局监控塔** | Lv.6 | 鸟瞰全场状态→提前发现异常→与黑羊先知预言交叉验证 | 1 | 覆盖全场视野；可探测隐身怪兽（辅助热感摄像头） |
| **紧急避难中枢** | Lv.5-6 | 灾难发生时的"灵体避风港"→所有灵体可紧急撤入→等待安全 | - | 容纳上限=区域灵体总数；有独立供能不依赖外部电力 |

**建筑外观：** 最高点建筑，金色塔尖，俯瞰全区。内部只有一个豪华指挥席位+全息地图。

**员工特征：** 金色+光环灵体，唯一具备"个性"的灵体——有名字、有履历、有不可替代性。

#### 6.6.7 园区六：灵体生活园区（全等级辅助）

**定位：** 灵体的"诞生/死亡/休息/成长"功能集中区域。这里不直接产出价值，但是整个灵体系统运转的基础设施。

| 建筑名 | 功能描述 | 对应机制 |
|--------|----------|----------|
| **灵魂凝聚器** | 每60秒产出1个Lv.1灵体（可升级加速/批量产出） | 灵体来源——可建多个提升产出速率 |
| **灵魂收集器** | 收集消散的灵体粒子→30秒冷却后重生为Lv.1 | 死亡回收——位置影响收集效率（越近越快） |
| **休息充能站** | 灵体工作疲劳后来此休息→恢复效率→防止过劳 | 疲劳机制——无休息=工作效率逐渐降低 |
| **培训加速舱** | 消耗精华石→加速灵体升级（正常需8分钟→加速后4分钟） | 快速升级——资源换时间 |
| **灵体回收再造炉** | 主动"回收"低级灵体→转化为能量→加速高级灵体产出 | 优化策略——牺牲数量换质量 |

**建筑外观：** 柔和的绿色/白色光芒，内部有大量光柱和能量球。氛围如同"灵体产房"。

| 距离=效率 | 建筑离目标越近→灵体通勤越短→效率越高 | 把运维建筑放近vs.放远保安全？ |

| 管道补偿 | 管道可以替代部分人力运输→减少灵体暴露时间 | 投资管道vs.投资更多灵体？ |

| 虫群替代 | 虫群母体的工虫可替代T1-T2大部分工作 | 养虫群→省灵体 vs. 依赖灵体→更可控？ |

### 6.7 模块建造系统

> **核心理念：** 所有设施都是"基础框架 + 可解锁配件"的模块化组合。基础版免费或低成本获取，配件逐步解锁增强功能。**关键设计原则：没有配件也能玩，只是需要用自然/生态方式替代。** 配件是便利品，不是必需品——自然方式永远可行。

#### 6.7.1 模块一：孵化箱模块

| 层级 | 组件 | 功能 | 成本 | 解锁条件 |
|------|------|------|------|----------|

| 配件1 | 加温器 | 内置恒温加热，±5°C精度 | 铁×5 + 火晶×2 | 孵化3枚蛋后 |
| 配件2 | 加湿器 | 湿度自动维持在设定值 | 铁×3 + 水晶×1 | 孵化渊鲸蛋后 |
| 配件3 | 温度显示器 | 实时数字温度+最佳区间提示 | 铁×2 + 电力晶×1 | 孵化5枚蛋后 |
| 配件4 | 声音播放器 | 播放对应怪兽所需声音刺激 | 木材×3 + 精华石×2 | 发现声音对孵化有影响后 |
| 配件5 | 自动翻蛋器 | 定时翻转蛋体，均匀受热 | 铁×4 + 弹性凝胶×2 | 孵化10枚蛋后 |
| 配件6 | 隔音罩 | 隔绝外部噪音（黑羊先知蛋必需） | 暗纤维×3 + 蜂蜡×5 | 拥有黑羊先知后 |
| 配件7 | 多格扩展架 | 容量从1枚扩展到4枚 | 木材×8 + 铁×6 | 养殖等级5 |

**无配件的生态替代方案：**

| 配件功能 | 生态替代方式 | 效果对比 |
|----------|-------------|----------|
| 加温器 | 放在**熔岩巨蜥**旁边（体温60-80°C自然加热） | 温度不够精准但免费；需手动调整距离 |
| 加湿器 | 放在**渊鲸**水池边或瀑布旁 | 湿度取决于距离；水花可能打湿蛋壳 |

### 6.8 自动化调控系统

> **核心理念：** 当玩家的养殖场达到一定规模后，手动管理每个设施变得不可能。自动化调控系统让玩家通过"图纸"（蓝图/编程逻辑）将多个设施联动，实现条件触发的自动化运营。

#### 6.8.1 图纸系统

**设计理念：** 图纸是玩家的"自动化脑"——一套可视化的 IF-THEN 逻辑编辑器，让玩家设计设施之间的联动规则。

        ACTION["动作节点<br/>THEN 开启冷却 / 关灯 / 投食"]
        LINK["连线<br/>条件→动作"]
    end

    subgraph EXAMPLES["示例图纸"]

        EX2["图纸B：日夜节律<br/>IF 时间=夜晚<br/>THEN 关灯+开暗室<br/>AND 启动夜间巡逻"]

#### 6.8.2 可用条件节点

| 条件类型 | 可检测参数 | 示例 |
|----------|-----------|------|
| **环境条件** | 温度、湿度、光照、水位、风力 | IF 温度 > 40°C |
| **时间条件** | 白天/夜晚、黎明/黄昏、具体时段 | IF 时间 = 夜晚(20:00-6:00) |
| **季节条件** | 春/夏/秋/冬、季节切换瞬间 | IF 季节 = 冬季 |
| **怪兽状态** | 心情、饥饿度、体温、电量、位置 | IF 雷脊兽电量 > 90% |
| **设施状态** | 管道压力、蓄电池电量、食盆存量 | IF 食盆存量 < 20% |
| **事件条件** | 预言触发、事故发生、怪兽产蛋 | IF 黑羊先知发出预言 |

| 动作类型 | 可操作对象 | 示例 |
|----------|-----------|------|
| **设施开关** | 阀门、加温器、加湿器、灯光 | THEN 关闭热能阀门 |
| **管道调节** | 流量、方向、分流比例 | THEN 饲料管道分流70:30 |
| **灵体调度** | 派遣灵体到指定位置/切换任务 | THEN 派遣2名巡逻员到B区 |
| **通知** | 向玩家发送警报/提醒 | THEN 弹出警报"温度过高！" |
| **环境** | 灯光/声音/门禁 | THEN 开启暗室模式 |

**2. 区域灌溉自动化：**
- IF 土壤湿度 < 40% → THEN 开启灌溉管道阀门
- IF 水位 > +3格 → THEN 关闭灌溉 + 开启排水
- IF 季节=冬季 AND 温度<0°C → THEN 关闭灌溉 + 热管伴热

**3. 灯光/声音环境自动切换：**
- IF 时间=黎明 → THEN 渐亮灯光 + 播放晨曲 + 开启喂食站
- IF 时间=夜晚 → THEN 关闭灯光 + 开启暗室 + 启动夜间巡逻
- IF 黑羊先知心情>80 AND 时间=夜晚 → THEN 开启预言监听模式

| 日出冥想 | 时间=黎明 + 黑羊先知心情>70 | 安静模式+暗室开放 | 预言精度×2的"黎明预言" |
| 正午光合 | 时间=白昼 + 光照>80 | 苔原巨木兽区灌溉开启 | "烈日树脂"（琥珀树脂品质+30%） |
| 暴风飞行 | 风力≥4级 | 雾翼兽航线切换为暴风模式 | "风暴凝露"（稀有材料产出×3） |
| 深夜放电 | 时间=深夜 + 雷脊兽电量>80% | 开启放电塔+蓄电池充电 | "夜电晶"（电力晶品质+40%） |

## 七、动物行为

> 本章描述怪兽作为"有性格的个体"的全部行为系统：社会性、属性克制、求偶繁殖、亲代照顾、技能学习、独立事件、心情状态映射和日常照料。

> 📌 本节与 [7.6 三种繁殖方式详述](#76-三种繁殖方式详述)、[7.5 亲代照顾层级](#75-亲代照顾层级系统) 共同构成怪兽行为设计的三大支柱，补充了怪兽在成长期和成体期的社会行为细节。

> **设计理念：** 怪兽不是数值容器——它们有社会关系、有本能欲望、有学习过程。动物行为系统让每只怪兽成为有"性格"的个体，让养殖场充满不可预测的、有机的戏剧性。

#### 7.1.1 群居机制详细

**首领产生：** 群居怪兽在群体规模≥3时自动产生首领。首领由以下规则决定：

| 怪兽 | 首领产生方式 | 首领特权 | 更替条件 |
|------|------------|----------|----------|
| 虫群母体 | 体型最大者自动成为女王 | 分泌信息素指挥全群，产卵速度×2 | 新个体体型超越/女王衰老 |
| 雾翼兽 | 飞行时间最长者成为领航 | 决定航线，编队飞行效率+30% | 被更快个体超越/受伤停飞 |
| 雷脊兽 | 电量储备最高者成为核心 | 放电时为全组充能，产出+50% | 过载事故/被新个体超压 |

**群体规模效应：**

| 规模 | 效果 | 风险 |
|------|------|------|
| 2只 | 基础社交满足，产出+10% | 无 |
| 3-4只 | 产生首领，群体buff激活（+25%） | 饲料消耗+20% |
| 5-6只 | 群体行为涌现（集体飞行/放电），效率峰值 | 空间需求大，冲突概率+15% |
| 7只+ | 过度拥挤→暴躁度上升，内斗频发 | 可能分裂为两个敌对小群 |

**克制行为表现（非战斗）：**

| 克制方 → 被克方 | 行为表现 | 游戏影响 |
|----------------|----------|----------|
| 熔岩巨蜥 → 渊鲸 | 渊鲸回避巨蜥热区，水池蒸发加速 | 需加大渊鲸区域冷却投入 |
| 渊鲸 → 雷脊兽 | 雷脊兽在潮湿环境短路风险↑，回避水域 | 雷脊兽需干燥专区 |
| 雷脊兽 → 苔原巨木兽 | 巨木受电击后叶片枯萎，根系收缩 | 需物理隔离或电磁屏蔽 |
| 苔原巨木兽 → 雾翼兽 | 藤蔓缠绕翅膀→雾翼兽被绊住无法起飞 | 飞行区域禁止种植 |
| 雾翼兽 → 虫群母体 | 强气流吹散工虫阵型，虫群效率-40% | 航线需避开虫巢 |
| 虫群母体 → 黑羊先知 | 侦察虫追踪气味→隐身无效 | 用虫群反制黑羊逃跑 |
| 黑羊先知 → 熔岩巨蜥 | 预言诅咒→巨蜥暴躁度+30%，可能失控 | 需隔离或安抚 |

**克制关系的策略利用：**
- 用虫群侦察虫监控黑羊先知（反逃跑）
- 让雾翼兽气流驱赶虫群到指定区域（虫群搬运）
- 利用黑羊先知的预言识别哪些区域雷脊兽即将过载

#### 7.5.2 各等级详细设计

##### S级：必须亲力亲为 —— 渊鲸

| 要素 | 详情 |
|------|------|
| **照顾表现** | 母鲸在分娩前2min开始发出低频安抚声波，分娩全程陪伴在侧；幼鲸出生后24h内母鲸不离开1格距离 |
| **强制需求** | 必须建造"水下产房"（水深≥4格+水温恒定15-20°C+隔离其他怪兽）；母鲸分娩期间区域必须安静（噪音<30dB） |
| **玩家干预** | 禁止将幼鲸移走（强行移走→母鲸暴怒→撞击设施）；只能在旁辅助（调温/供氧/安保） |
| **离巢时间** | 幼鲸跟随母鲸至少5min（游戏时间），之后逐渐独立游泳 |
| **缺失后果** | 若母鲸被迫与幼鲸分离→母鲸停止进食+停止歌唱（全场失去安抚声波）→持续2min抑郁期 |
| **配套设施** | 水下产房（T4设施）、产前监控台（Lv.3灵体操作）、幼鲸护栏（防止被水流冲走） |

##### A级：强烈偏好自己照顾 —— 黑羊先知

| 要素 | 详情 |
|------|------|
| **照顾表现** | 母羊产后立即舔舐幼羊清洁；用角轻触幼羊建立气味标记；夜间将幼羊藏在暗角保护 |
| **可接受替代** | 可以接受孵化箱/育婴室，但每3min会来查看一次；如果"看不到"幼羊→焦虑→隐身寻找 |
| **玩家干预** | 可以将幼羊放入育婴室，但必须设计亲代探视通道（暗道连接育婴室）；否则亲代会隐身闯入 |
| **离巢时间** | 幼羊约2min后开始独立探索，但每次回到母羊身边才会安心入睡 |
| **缺失后果** | 完全隔离→母羊释放持续恐惧气场→周围灵体恐慌+其他怪兽暴躁 |
| **特殊机制** | 黑羊先知会"预言"幼羊的命运——如果预言为"凶"，可能会拒绝照顾甚至攻击幼羊（需紧急隔离） |
| **配套设施** | 母子暗室（安静+黑暗+攀爬面）、亲代探视暗道、预言监听装置（防止"凶兆攻击"） |

##### B级：可接受孵化箱 —— 雾翼兽 / 苔原巨木兽

**雾翼兽（B级·偏放养）：**

| 要素 | 详情 |
|------|------|
| **照顾表现** | 父兽偶尔带幼兽短飞训练（教学型）；母兽产蛋后倾向飞走（迁徙本能>母性） |
| **可接受替代** | 完全接受孵化箱+人工养育；偶尔飞过查看（约5min一次），但不焦虑 |
| **玩家干预** | 可自由移动蛋/幼体；建议保留高台让亲代可以"路过"查看（增加少量亲代加成） |
| **缺失后果** | 无明显负面效果；但有亲代在场→幼体飞行学习速度+30% |
| **配套设施** | 高台筑巢区（可选）、安全网（防幼体摔落）、风道（幼体练飞用） |

**苔原巨木兽（B级·被动照顾）：**

| 要素 | 详情 |
|------|------|
| **照顾表现** | 根系自然包裹种子提供养分+保温（被动照顾，不需主动意识） |
| **可接受替代** | 种子可放入温室育苗床，无需亲代在场 |
| **玩家干预** | 完全可控；但亲代根系附近种下→成长速度+40%（天然优势） |
| **缺失后果** | 无负面效果；离开亲代只是失去根系营养加成 |
| **配套设施** | 温室育苗床（温控+光照+灌溉）、亲代根区标记（指示最佳种植位） |

##### C级：不在乎 —— 熔岩巨蜥

| 要素 | 详情 |
|------|------|
| **照顾表现** | 对蛋完全无感——可能无意间用体温孵蛋（效果好），也可能踩碎蛋（体型太大） |
| **可接受替代** | 完全接受任何替代方案；蛋放在哪无所谓 |
| **玩家干预** | 完全自由；唯一需注意：利用它的体温孵蛋时要控制距离（太近→过热→蛋裂） |
| **缺失后果** | 无任何负面效果 |
| **利用策略** | 把需要高温的蛋放在它的休息区旁边（免费加热），但保持安全距离 |
| **配套设施** | 高温孵化炉（独立设施，不依赖亲代）；可选：巨蜥休息区旁的隔热蛋架 |

##### D级：可能伤害后代 —— 雷脊兽

| 要素 | 详情 |
|------|------|
| **危险行为** | 雷脊兽放电时不会避开自己的蛋/幼体→电击会直接伤害甚至杀死后代 |
| **必须隔离** | 蛋必须在产出后立即移走（30s窗口期）；幼体绝对不能进入成体活动区 |
| **玩家干预** | 必须主动干预——设计蛋收集系统（产蛋→自动传送带→安全区）；安排灵体24h值守 |
| **缺失后果** | 不隔离→幼体被电击伤亡率60%+；蛋不移走→可能被过载放电炸碎 |
| **矛盾设计** | 蛋本身需要微电流刺激孵化——所以完全隔绝电源也不行，需要"可控微电流"而非"成体暴力放电" |
| **配套设施** | 绝缘蛋收集槽（产蛋后自动滚入安全区）、微电流孵化器（可控低压刺激）、亲代隔离围栏（绝缘材质） |

##### 特殊级：集群繁殖 —— 虫群母体

| 要素 | 详情 |
|------|------|
| **繁殖方式** | 无性分裂——母体直接产出大量虫卵，无需配偶，无个体亲代概念 |
| **照顾方式** | 工虫集体照顾全部虫卵——温控/翻卵/防护由工虫群完成 |
| **玩家干预** | 通过管理工虫工作区域间接控制——设置"保育优先"可增加虫卵存活率 |
| **特殊机制** | 母体可"选择"产出哪种工虫——玩家通过饲料类型/温度影响分化方向 |
| **缺失后果** | 工虫全被消灭→母体恐慌收缩→停止产卵直到新工虫培育完成 |
| **配套设施** | 蜂巢扩展区（增加产卵空间）、虫卵培育温室（精确温控决定虫种分化）、工虫指挥信标 |

| 自然孵化（利用怪兽） | 零成本；可能有天然加成 | 不可控；有风险 | 前期+生态流玩法 |

#### 4.5C.7 发情期管理系统

> **设计理念：** 发情期是繁殖系统的核心驱动力，也是养殖场最"惊心动魄"的定期挑战。每种怪兽的发情表现截然不同，从熔岩巨蜥的岩浆喷射到渊鲸的海啸歌声。玩家必须在自然交配、灵体堆叠安抚和镇静隔离之间做出策略选择。**灵体堆叠安抚**是本系统的喜剧核心——想象一群小人穿着蹩脚的怪兽皮套试图骗过一只发情的巨兽。

| 熔岩巨蜥 | 每季1次 | 3天 | 体温骤升200°C/频繁嘶吼/地面裂纹 | 极高（熔岩喷射，可熔毁建筑） | 异性交配 > 灵体堆叠 > 镇静 |
| 渊鲸 | 每年1次（春季） | 5天 | 歌声改变为低频共振/水面跃动/发光增强 | 中（巨浪冲击岸边设施） | 异性交配 > 灵体堆叠 > 镇静 |
| 黑羊先知 | 不定期（预言触发） | 2天 | 频繁预言/攻击性上升/瞳孔变为全黑 | 低（逃跑为主，但预言可能误导灵体） | 灵体堆叠 > 镇静 > 异性交配 |
| 虫群母体 | 每月1次 | 1天 | 工虫暴增300%/巢穴膨胀/释放信息素 | 中（虫群扩散入侵其他区域） | 自然分裂 > 镇静 > 灵体堆叠 |

##### 灵体堆叠安抚系统（重点玩法）

> **核心概念：** 类似大型舞狮——多个灵体叠在一起，穿上特制的仿生外壳，模拟同类怪兽的外形和行为，引导发情怪兽将情绪转移到"假同类"身上，从而疏导发情压力。这是一个充满喜剧张力的高风险操作。

**各怪兽堆叠参数：**

| 怪兽 | 最少灵体 | 推荐灵体 | 基础成功率 | 识破后果 | 喜剧场景描述 |

| 熔岩巨蜥 | 8 | 12 | 55% | 暴怒+熔岩喷射（灵体烧伤风险40%） | 12个穿隔热服的灵体从金属骨架里弹出四散奔逃，隔热服着火拖着火尾巴跑 |
| 渊鲸 | 6 | 10 | 70% | 哀鸣+水压攻击（灵体被冲散） | 灵体穿橡胶鲸皮在水面上漂浮，被真鲸一个拱鼻直接飞上天 |
| 黑羊先知 | 3 | 5 | 40% | 识破率最高→直接逃跑并留下嘲讽预言 | 先知一开始就知道是假的，配合演出30分钟后突然消失，留下字条"演技3分" |
| 虫群母体 | 15 | 20 | 65% | 工虫包围"假母体"进行"验证" | 20个灵体套在一个巨大虫壳里，工虫困惑地爬满它们试图喂食 |
| 雾翼兽 | 5 | 8 | 75% | 追逐"假鸟"→灵体从空中坠落 | 灵体用纸翅膀绑在吊索上滑翔，一阵风把翅膀吹散像下饺子一样掉落 |
| 苔原巨木兽 | 10 | 15 | 80%（最容易） | 缠绕"假树"→灵体被藤蔓困住 | 灵体举着树枝站在花盆里一动不动假装光合作用，一个灵体打喷嚏全部倒塌 |
| 雷脊兽 | 6 | 9 | 50% | 电击"假兽"→灵体全身冒烟 | 灵体穿绝缘服在金属壳里摆pose，被电后头发全部竖起变成刺猬状 |

### 7.9 心情-状态-行为映射系统

> **设计理念：** 心情不只是一个数值——它是怪兽"活着"的外在表达。不同心情等级下，每种怪兽展现截然不同的行为模式，从带来收益的积极表现到可能毁坏设施的危险举动。心情系统是玩家与怪兽之间"无言对话"的核心载体。

#### 7.9.1 心情等级划分

| 心情值 | 等级 | 状态名 | 视觉提示 | 系统影响 |
|--------|------|--------|----------|----------|
| 90–100 | 极乐 | 狂喜 | 怪兽周围出现金色光粒/表情符号 | 产出效率 ×2；共生加成 +50%；可触发专属表演 |
| 70–89 | 开心 | 满足 | 正常偏亮色调，偶尔发出愉悦声 | 产出效率 ×1.2；正常共生；装置使用意愿高 |
| 40–69 | 平静 | 正常 | 标准外观，无特殊表现 | 基础产出；标准共生效率 |
| 20–39 | 低落 | 烦躁 | 体色变暗/动作迟缓/偶尔发出低吼 | 产出效率 ×0.6；共生中断概率 30%；拒绝使用装置 |
| 0–19 | 暴怒/抑郁 | 危险 | 体表异常反应（发光/冒烟/放电等） | 产出停止；攻击行为；破坏设施；灵体伤亡风险 |

#### 7.9.4 状态叠加效果矩阵

#### 7.9.5 心情管理策略指南

| 场景 | 推荐策略 | 预期效果 |
|------|----------|----------|
| 新怪兽入场，心情偏低 | 放置偏好造景 + 分配专属灵体抚慰 + 投喂高品质饲料 | 2–3 天内心情升至"开心" |
| 冬季全场心情普降 | 集中供暖（熔岩巨蜥热量辐射） + 增加室内造景 + 减少劳动安排 | 维持"平静"以上 |
| 怪兽间冲突导致心情暴跌 | 物理隔离 + 中间放置缓冲造景 + 渊鲸声波安抚 | 冲突方 3 天内恢复"平静" |
| 目标冲击"完美高光"状态 | 全属性拉满：高级饲料 + 充分休息 + 偏好造景全覆盖 + 灵体定时互动 | 触发概率约 15%/天（极有成就感） |


### 7.10 日常照料系统

> **设计理念：** 照料巨型怪兽是本游戏最核心的视觉卖点之一。当 1/30 体型的灵体员工（约成体怪兽的"蚂蚁大小"）忙碌在楼房级巨兽脚下时，产生的"巨构感"是其他游戏无法复制的视觉体验。每种怪兽在每个成长阶段的照料方式都不同，从"手捧幼崽"到"蚂蚁伺候恐龙"的体型变化过程本身就充满戏剧性。

![日常照料](./assets/12.png)

## 八、事件与收藏

> 本章涵盖随机事件系统（为养殖场注入不可预测的戏剧性）和随机收集与出版系统（为玩家提供长期收集目标和成就感）。

### 8.1 随机事件系统

> **设计理念：** 养殖场不是真空中的孤岛——它存在于一个活的世界中。访客来来去去，日常中充满小意外，偶尔天灾降临。随机事件系统让每一次游玩都充满惊喜和挑战，同时通过玩家的选择塑造养殖场的独特故事。

### 8.2 随机收集与出版系统

> **设计理念：** 养殖场不只是生产线——它也是一座充满故事的活博物馆。玩家在日复一日的经营中，可以像野生动物摄影师一样"捕捉"怪兽的珍贵行为瞬间，将它们编纂成图鉴出版，收集来自宇宙各处的漂流信息，拼凑出远超养殖场本身的宏大世界观。

#### 8.2.1 动物行为图鉴系统

##### 观察与记录机制

玩家（或指定的**观察员灵体**）可以在游戏中"拍摄"怪兽的特殊行为。当怪兽执行可记录行为时，屏幕边缘闪烁相机图标提示，玩家点击即可记录。

| 机制 | 说明 |
|------|------|
| 记录方式 | 点击闪烁的相机图标 / 指派观察员灵体自动记录（成功率 70%） |
| 记录窗口 | 行为发生后持续 5–15 秒（稀有行为窗口更短） |
| 记录品质 | 取决于观察距离 + 灵体等级 + 是否干扰了行为 |
| 存储位置 | 图鉴书架（养殖场内建筑，可升级扩容） |

| 行为等级 | 概率 | 每种怪兽数量 | 示例 | 记录奖励 |

| **季节级** | 特定季节 | 3–4 种 | 苔原巨木兽秋季落叶雨/雾翼兽春季求偶飞行/雷脊兽冬季蓄电发光 | 图鉴经验 +15 |
| **稀有级** | 特定条件触发 | 2–3 种 | 黑羊先知满月夜隐身跳舞/渊鲸与雷脊兽雷暴中对唱/虫群母体分裂出金色工虫 | 图鉴经验 +50 |
| **传说级** | 极端条件 + 低概率 | 1 种 | 七兽同时进入极乐状态的"共鸣时刻"/熔岩巨蜥在暴风雪中为全场生物形成熔岩穹顶 | 图鉴经验 +200 |

| **熔岩巨蜥** | 打哈欠喷小火团；用尾巴烤食物；在岩浆池中"泡澡"翻肚皮；抖落火山灰尘（像狗甩水） | 冬季为小型怪兽提供"暖炉"服务；夏季自主降温喷出蒸汽幕 | 蓝焰模式闪现（全身火焰变蓝 2 秒）；与苔原巨木兽根系"握手"传热 | 在暴风雪中展开熔岩穹顶，庇护全场生物 |
| **渊鲸** | 浮出水面喷水柱；用声波逗弄水中小鱼；尾鳍拍水溅灵体一身 | 春季深潜产珍珠上浮展示；秋季声波探矿后兴奋翻滚 | 与雷脊兽在雷暴天对唱（声波 + 电弧交织）；在满月夜浮出水面"望月" | 发出可被全星球接收的深海长歌（触发特殊星际事件） |
| **黑羊先知** | 突然隐身吓灵体一跳；在高处凝视远方；用角敲击岩壁发出暗语节奏 | 春季换毛后暗纤维散落如黑色雪花；秋季对着落叶发出预言低语 | 满月夜隐身跳舞（月光下可见半透明轮廓）；三眼同时睁开发出预言闪光 | 预言准确度达到 100% 的"绝对预言"——预言内容直接显示在屏幕上 |
| **虫群母体** | 工虫排成心形/图案飞行；母体"打呼"时蜂巢共振嗡鸣；工虫给母体"按摩" | 春季大规模分蜂仪式（壮观的虫群漩涡）；冬季工虫抱团取暖形成活毯 | 分裂出金色变异工虫（可收集）；工虫自发搭建微型雕塑 | 虫群组成巨型图案飞行表演（全场可见的空中图画） |
| **雾翼兽** | 在气流中"冲浪"翻滚；用翼尖戳灵体逗玩；高空俯冲急停炫技 | 春季求偶飞行（尾迹画出心形）；秋季逆风飞行收集落叶筑巢 | 穿越雷脊兽电弧的"闪电飞行"（翼尖带电）；在渊鲸水柱上方悬停"淋浴" | 达到音速瞬间——冲破空气产生可见音爆环 |
| **苔原巨木兽** | 缓慢伸展枝条"伸懒腰"；树冠中栖息的小生物跳出；根系吸水时地面微震 | 春季爆发式开花（全树在 1 分钟内开满）；秋季果实成熟自动弹射 | 树干上长出发光菌丝形成"星空"图案；与地下水系共振发出低频"歌声" | 一夜之间长高一整层楼（需要紧急扩建围栏） |
| **雷脊兽** | 打喷嚏放出小电花；用静电吸起灵体的工具；脊背电弧随心跳节律闪烁 | 夏季雷暴天兴奋冲到室外"充电"；冬季节电模式脊背光暗淡 | 与渊鲸对唱时电弧形成音符形状；超导状态——全身零电阻发出极亮白光 2 秒 | 蓄满能量后向天空释放人造极光（全场夜空变为彩色） |

## 九、数值与经济

> 本章将所有定性描述量化为属性参数、阶段时长、资源系统、职业体系、出售价格、可交易物品清单和经济大循环图——让设计可落地、可调试。

### 9.1 核心属性

| 属性 | 范围 | 消耗/增长 | 影响 |
|------|------|-----------|------|
| 饥饿度 | 0–100 | -1/5秒（幼年期） | 降到 0 停止成长 |
| 成长值 | 0–100 | 喂食 +5~+10 | 满 100 进入下一阶段 |
| 羁绊值 | 0–100 | 见羁绊系统 | 决定最终产出品质 |
| 心情 | 0–100 | 环境匹配 +/-1/min | 影响行为频率、装置使用意愿 |
| 体重 | 0–100 | 喂食 +3~+8 / 运动 -2~-5 | 影响体型判定和装置效率 |
| 体力 | 0–100 | 运动 -10~-20 / 睡眠 +30 | 体力耗尽停止使用装置 |

#### 8.1.1 体型判定

| 体重范围 | 体型 | 装置影响 |
|----------|------|----------|
| 0–30 | 偏瘦 | 滚轮：速度快但 5 秒就累 / 蹦床：弹超高 / 发电效率低 |
| 31–70 | 标准 | 各项平衡 |
| 71–100 | 偏胖 | 滚轮：速度慢但跑 20 秒 / 蹦床：弹不高 / 发电效率高 |


### 9.2 阶段时长（MVP 设计值）

**设计基准：** 单只怪兽完整周期约 10–15 分钟，与季节周期（15 分钟/季）形成呼应——一个季节内恰好能将一只怪兽从蛋养到接近成体。

| 阶段 | 目标时长 | 触发条件 | 设计意图 |
|------|----------|----------|----------|
| 孵化 | 1–2 分钟 | 蛋放入孵化架后计时 | 给予摆放/温度调节的操作时间 |
| 幼年（管道喂食） | 3–5 分钟 | 成长值 0→100 | 管道设计+饲料搭配需要思考 |
| 成长（区域养殖） | 4–6 分钟 | 成长值 0→100（第二段） | 观察+布局调整+共生发现 |
| 成熟 | 持续 | 每 90 秒产出一次 | 长期经营回报 |

**季节与成长的节奏对应：**

| 时间节点 | 游戏进程 |
|----------|----------|
| 0–15 分钟（春季） | 获取首批蛋→孵化→幼体诞生→开始喂养；配种季 |
| 15–30 分钟（夏季） | 首批怪兽进入少年/成体→产出高峰→全力运转 |
| 30–45 分钟（秋季） | 收获资源→囤积过冬→第二批蛋孵化→扩建 |
| 45–60 分钟（冬季） | 保暖挑战→维持最低运转→规划下一年→总结 |

#### 8.6.2 职业详细设计

| 职业 | 触发条件 | 工作内容 | 效率因素 | 趣味细节 |
|------|----------|----------|----------|----------|
| **农夫** | 标准体型 + 高羁绊 + 温顺 | 自动浇水/播种/收割田地 | 羁绊越高越勤快，心情低会偷吃作物 | 戴着小草帽干活，丰收时开心跳 |
| **保姆** | 高羁绊 + 社交经验多 + 泡温泉多 | 照顾幼崽（喂食+安抚+加速成长） | 社交值越高，同时照顾的幼崽越多 | 会叼着幼崽走来走去，幼崽骑在背上 |
| **矿工** | 偏胖体型 + 高体力 + 岩地偏好 | 自动采矿/碎石，产出石料+稀有矿 | 体重越重，挖得越深/越快 | 满身泥巴回来，需要去温泉洗澡 |
| **伐木工** | 标准/偏胖 + 高体力 + 森林偏好 | 自动砍树获得木材 | 体力上限决定持续工作时长 | 用头撞树，树倒了会被吓一跳 |
| **发电员** | 偏胖 + 滚轮使用经验丰富 | 高效率跑滚轮（发电量 ×1.5） | 体重 + 滚轮熟练度 | 跑得很开心，已经习惯了 |
| **守卫** | 暴躁性格 + 高体力 + 独处偏好 | 巡逻养殖场，防止随机事件 | 体力 + 暴躁值（越暴越能打） | 看到可疑东西会怒吼，吓跑入侵者 |

#### 8.6.3 职业适性判定规则

\`\`\`

职业适性 = 权重打分制，取最高分方向：

农夫得分 = (羁绊值×0.3) + (温顺度×0.3) + (体型标准度×0.2) + (作物接触经验×0.2)
保姆得分 = (羁绊值×0.4) + (社交经验×0.3) + (温泉使用次数×0.2) + (温顺度×0.1)
矿工得分 = (体重×0.3) + (体力上限×0.3) + (岩地适应度×0.2) + (挖掘经验×0.2)
伐木工得分 = (体力上限×0.4) + (体重×0.2) + (森林适应度×0.2) + (力量×0.2)
发电员得分 = (体重×0.3) + (滚轮使用次数×0.4) + (体力上限×0.2) + (耐心×0.1)
守卫得分 = (暴躁值×0.3) + (体力上限×0.3) + (独处偏好×0.2) + (体型×0.2)
\`\`\`

**玩家无需理解公式**——成长过程中 UI 会提示"这只怪兽看起来很适合当农夫"，玩家可以顺势也可以无视。

> 📌 **与七种怪兽的对应关系：** 职业系统主要适用于可批量养育的通用怪兽。七种核心怪兽（熔岩巨蜥、渊鲸等）由于各自拥有独特的共生机制和专属设施，其"职业"即为共生网络中的角色定位（热源/水源/电力中枢等），不参与通用职业分配。工虫（来自虫群母体）天然覆盖清扫/搬运/采集职能。

**关键技术决策：**
- 主地图为实时 3D 渲染，享受光影/粒子/模型动画的表现力
- 孵化面板、管道编辑面板保持 **2D UI 弹窗**——逻辑简单，不需要 3D

## 十一、视觉方案

### 11.1 风格定义

**风格关键词：** 等距轴测 / 风格化 3D 渲染感 / 哑光材质 / 平面构成 / 设计文档感

**风格描述：** 介于扁平插画与 3D 渲染之间——物体有体积和光影，但通过大色块和简化材质表达，整体呈现高质量微缩模型/建筑沙盘的观感。强调空间几何结构和材质区分，色彩沉稳丰富、克制但不灰暗。

**核心特征：**
- 物体表面光滑，非低多边形切面，有自然的明暗体积
- 统一柔和光照（顶侧光），产生环境遮蔽和轻微投影
- 材质可辨——金属/玻璃/木头/石头/植被各有质感差异
- 整体像一张专业的游戏场景概念设计图（Concept Art Design Sheet）
- 色块感强但无明显硬边界，颜色区域自然过渡
- 暗色（深青/墨绿）做主调，暖色（赭石/橙/奶白）做点缀

**参考方向：** 高端游戏概念设计图 / Northgard、Bad North 等策略游戏美术 / 建筑可视化微缩模型

### 11.3 怪兽表现方案

怪兽造型为风格化生物设计——有明确的身体结构（头/躯干/四肢/尾），比例简化但可识别为具体生物类型。非Q版blob，非写实动物。像高质量手办/粘土模型。

\`\`\`

成长阶段外观策略：
- 蛋期：光滑椭圆体，有斑纹色块区分种类
- 幼体：圆润小型，大头比例，四肢短小，表情简单
- 少年：体型增长，长出标志性特征（角/尾/鳍），比例趋近成体
- 成体：大型完整造型，占据大量空间，具有"雕塑感"的存在

动画方式（Tween 为主 + 少量关键帧）：
- Idle:    身体轻微起伏呼吸 / 尾巴缓慢摆动
- Eating:  头部低下 / 咀嚼节奏缩放
- Happy:   身体轻微弹跳 / 表情变化
- Sleeping: 身体伏低 / 呼吸节奏放大
- Walking: 身体前倾微晃 / 简单的步态循环（可 Tween 模拟）
\`\`\`

### 11.4 技术方案：3D 模型 + 固定轴测摄像机

| 决策 | 内容 |
|------|------|
| 引擎 | Godot 4.x 3D 模式 |
| 摄像机 | 正交投影（Orthographic），固定 30° 轴测角度，不可旋转 |
| 模型 | 简模（500-2000 面/个），手绘风格化贴图或 Vertex Color |
| 材质 | 哑光 Toon Shader，无 PBR 金属度，强调色块和材质区分 |
| 光照 | 单盏平行光（模拟自然顶侧光）+ 环境光 + SSAO，固定不动态变化 |
| 动画 | 骨骼绑定（怪兽）+ AnimationPlayer + Tween 辅助 |
| 输出 | 实时 3D 渲染 |

## 十五、已知风险与应对

| # | 风险 | 概率 | 影响 | 应对策略 |
|---|------|------|------|----------|
| 1 | 3D 建模工作量超预期 | 高 | 美术瓶颈 | AI 工具出白模+严格控制面数；不够就用灰盒顶 |
| 2 | 骨骼动画调试耗时 | 高 | 表现力不足 | 动作尽量少(5个)；Idle/Walk 优先，其余用 Tween 补 |
| 3 | Godot 3D 性能/Shader 踩坑 | 中 | 画面达不到效果 | 第 1 天就调通 Toon Shader+SSAO 管线 |
| 4 | 管道连通算法复杂度超预期 | 中 | 卡进度 | MVP 只做直线/L 形，不做路径搜索 |
| 5 | 装置+电力系统交互 bug 多 | 中 | 卡进度 | MVP 只做滚轮→温泉单线供电 |

mermaid.run({ nodes: document.querySelectorAll('.mermaid') }).then(function() {
  var lightbox = document.getElementById('mermaid-lightbox');
  var lightboxBody = document.getElementById('mermaid-lightbox-body');
  var lightboxClose = document.getElementById('mermaid-lightbox-close');

  var currentZoom = 1;

  function openLightbox(mermaidEl) {
    var svg = mermaidEl.querySelector('svg');
    if (!svg) return;
    var clone = svg.cloneNode(true);
    clone.removeAttribute('width');
    clone.removeAttribute('height');
    clone.removeAttribute('style');
    clone.style.width = '95vw';
    clone.style.minWidth = '90vw';
    clone.style.maxHeight = '85vh';
    clone.style.height = 'auto';
    currentZoom = 1;
    lightboxBody.innerHTML = '';
    lightboxBody.appendChild(clone);
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  document.getElementById('zoom-in').addEventListener('click', function() {
    currentZoom = Math.min(currentZoom + 0.25, 4);
    applyZoom();
  });
  document.getElementById('zoom-out').addEventListener('click', function() {
    currentZoom = Math.max(currentZoom - 0.25, 0.5);
    applyZoom();
  });
  document.getElementById('zoom-reset').addEventListener('click', function() {
    currentZoom = 1;
    applyZoom();
  });

  function applyZoom() {
    var svg = lightboxBody.querySelector('svg');
    if (svg) {
      svg.style.transform = 'scale(' + currentZoom + ')';
      svg.style.transformOrigin = 'top center';
    }
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxBody.innerHTML = '';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.mermaid').forEach(function(el) {
    el.setAttribute('title', '点击放大查看');

(function() {
  var content = document.getElementById('content');
  var toc = document.getElementById('toc');
  var sidebar = document.getElementById('sidebar');
  var toggle = document.getElementById('sidebar-toggle');
  var collapseBtn = document.getElementById('sidebar-collapse-btn');
  var overlay = document.getElementById('sidebar-overlay');
  var headings = content.querySelectorAll('h1, h2, h3, h4');
  var isMobile = function() { return window.innerWidth <= 900; };

  // Assign IDs to headings, then build TOC via tree structure
  var idCounters = {};
  var tocTree = [];

  headings.forEach(function(h) {
    var tag = h.tagName.toLowerCase();
    var text = h.textContent.trim();
    var baseId = text.replace(/[^\w\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '') || 'section';
    if (!idCounters[baseId]) {
      idCounters[baseId] = 0;
      h.id = baseId;
    } else {
      idCounters[baseId]++;
      h.id = baseId + '-' + idCounters[baseId];
    }
    tocTree.push({ tag: tag, text: text, id: h.id });
  });

  // Two-pass: determine parent-child, then render
  function renderToc(items) {
    var html = '<ul>';
    var i = 0;
    while (i < items.length) {
      var item = items[i];
      if (item.tag === 'h1') {
        html += '<li class="toc-h1"><a href="#' + item.id + '"><span class="toc-label" title="' + item.text.replace(/"/g,'&quot;') + '">' + item.text + '</span></a></li>';
        i++;
      } else if (item.tag === 'h2') {
        var h3Children = [];
        var j = i + 1;
        while (j < items.length && items[j].tag !== 'h1' && items[j].tag !== 'h2') {
          if (items[j].tag === 'h3' || items[j].tag === 'h4') h3Children.push(items[j]);
          j++;
        }
        var hasChildren = h3Children.some(function(c) { return c.tag === 'h3'; });
        var h3Count = h3Children.filter(function(c) { return c.tag === 'h3'; }).length;
        var autoExpand = hasChildren && h3Count <= 2;
        var cls = 'toc-h2' + (hasChildren ? ' has-children' : '') + (autoExpand ? ' expanded' : '');
        html += '<li class="' + cls + '" data-target="' + item.id + '">';
        html += '<a href="#' + item.id + '"><span class="toc-chevron">▶</span><span class="toc-label" title="' + item.text.replace(/"/g,'&quot;') + '">' + item.text + '</span></a>';
        if (hasChildren) {
          html += '<ul class="toc-h3-list">';
          var k = i + 1;
          while (k < items.length && items[k].tag !== 'h1' && items[k].tag !== 'h2') {
            if (items[k].tag === 'h3') {
              var h4Kids = [];
              var m = k + 1;
              while (m < items.length && items[m].tag !== 'h1' && items[m].tag !== 'h2' && items[m].tag !== 'h3') {
                if (items[m].tag === 'h4') h4Kids.push(items[m]);
                m++;
              }
              var h3HasKids = h4Kids.length > 0;
              var h3AutoExpand = h3HasKids && h4Kids.length <= 2;
              var h3cls = 'toc-h3' + (h3HasKids ? ' has-children' : '') + (h3AutoExpand ? ' expanded' : '');
              html += '<li class="' + h3cls + '" data-target="' + items[k].id + '">';
              html += '<a href="#' + items[k].id + '"><span class="toc-h3-chevron">▶</span><span class="toc-label" title="' + items[k].text.replace(/"/g,'&quot;') + '">' + items[k].text + '</span></a>';
              if (h3HasKids) {
                html += '<ul class="toc-h4-list">';
                for (var n = 0; n < h4Kids.length; n++) {
                  html += '<li class="toc-h4" data-target="' + h4Kids[n].id + '"><a href="#' + h4Kids[n].id + '"><span class="toc-label" title="' + h4Kids[n].text.replace(/"/g,'&quot;') + '">' + h4Kids[n].text + '</span></a></li>';
                }
                html += '</ul>';
              }
              html += '</li>';
              k = m;
            } else {
              k++;
            }
          }
          html += '</ul>';
        }
        html += '</li>';
        i = j;
      } else {
        i++;
      }
    }
    html += '</ul>';
    return html;
  }

  toc.innerHTML = renderToc(tocTree);

  // Click handler for TOC links
  toc.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (!a) return;
    e.preventDefault();
    var targetId = a.getAttribute('href').slice(1);
    var target = document.getElementById(targetId);
    if (!target) return;

    var liH2 = a.parentNode;
    if (liH2 && liH2.classList.contains('toc-h2') && a.parentNode === liH2) {
      liH2.classList.toggle('expanded');
    }

    var liH3 = a.parentNode;
    if (liH3 && liH3.classList.contains('toc-h3') && a.parentNode === liH3) {
      liH3.classList.toggle('expanded');
    }

    target.scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (isMobile()) {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    }
  });

  // Expand parent h2 when clicking h3, expand parent h3 when clicking h4
  toc.querySelectorAll('.toc-h3 a').forEach(function(a) {
    a.addEventListener('click', function() {
      var parentH2 = a.closest('.toc-h2');
      if (parentH2) parentH2.classList.add('expanded');
    });
  });
  toc.querySelectorAll('.toc-h4 a').forEach(function(a) {
    a.addEventListener('click', function() {
      var parentH3 = a.closest('.toc-h3');
      if (parentH3) parentH3.classList.add('expanded');
      var parentH2 = a.closest('.toc-h2');
      if (parentH2) parentH2.classList.add('expanded');
    });
  });

  // Scroll Spy via IntersectionObserver
  var tocItems = toc.querySelectorAll('.toc-h2, .toc-h3, .toc-h4');
  var headingMap = {};
  tocItems.forEach(function(item) {
    headingMap[item.getAttribute('data-target')] = item;
  });

  var activeItem = null;
  var activeParent = null;
  var activeGrandparent = null;
  function setActive(id) {
    if (activeItem) activeItem.classList.remove('active');
    if (activeParent) activeParent.classList.remove('active');
    if (activeGrandparent) activeGrandparent.classList.remove('active');
    var item = headingMap[id];
    if (!item) return;
    item.classList.add('active');
    activeItem = item;
    activeParent = null;
    activeGrandparent = null;
    var parentH3 = item.closest('.toc-h3');
    var parentH2 = item.closest('.toc-h2');
    if (item.classList.contains('toc-h4') && parentH3) {
      parentH3.classList.add('expanded');
      parentH3.classList.add('active');
      activeParent = parentH3;
      if (parentH2) {
        parentH2.classList.add('expanded');
        activeGrandparent = parentH2;
      }
    } else if (item.classList.contains('toc-h3') && parentH2) {
      parentH2.classList.add('expanded');
      parentH2.classList.add('active');
      activeParent = parentH2;
    } else if (parentH2) {
      parentH2.classList.add('expanded');
    }
    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  var visibleSections = [];
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      var id = entry.target.id;
      if (entry.isIntersecting) {
        if (visibleSections.indexOf(id) === -1) visibleSections.push(id);
      } else {
        var idx = visibleSections.indexOf(id);
        if (idx > -1) visibleSections.splice(idx, 1);
      }
    });
    if (visibleSections.length > 0) {
      var allIds = [];
      headings.forEach(function(h) { allIds.push(h.id); });
      var first = null;
      var firstIndex = Infinity;
      visibleSections.forEach(function(id) {
        var i = allIds.indexOf(id);
        if (i < firstIndex) { firstIndex = i; first = id; }
      });
      if (first) setActive(first);
    }
  }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });

  headings.forEach(function(h) {
    if (h.tagName === 'H2' || h.tagName === 'H3' || h.tagName === 'H4') observer.observe(h);
  });

  // Sidebar toggle (mobile & desktop collapse)
  toggle.addEventListener('click', function() {
    if (isMobile()) {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    } else {
      document.body.classList.remove('sidebar-collapsed');
      toggle.style.display = 'none';
    }
  });

  collapseBtn.addEventListener('click', function() {
    if (isMobile()) {
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    } else {
      document.body.classList.add('sidebar-collapsed');
    }
  });

  overlay.addEventListener('click', function() {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  });

  // Auto-expand the first h2 section
  var firstH2 = toc.querySelector('.toc-h2');
  if (firstH2) firstH2.classList.add('expanded');
})();
</script>
